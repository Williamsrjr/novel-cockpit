<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Novel Cockpit</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/xml' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* 기존 스타일 시트 유지 */
:root{
  --bg0:#080c18;--bg1:#0c1222;--bg2:#111827;--bg3:#1a2236;--bg4:#243049;
  --fg:#e4e8f1;--fg2:#b4bdd0;--fg3:#6b7a94;--fg4:#3d4f68;
  --border:rgba(100,180,255,.06);--border2:rgba(100,180,255,.12);
  --glass:rgba(14,20,40,.65);--glass2:rgba(20,28,50,.5);
  --accent:#0ef;--accent2:#06b6d4;--accent-bg:rgba(0,238,255,.08);--accent-glow:rgba(0,238,255,.15);
  --docs:#2dd4a8;--docs-bg:rgba(45,212,168,.1);--docs-bd:rgba(45,212,168,.25);
  --nc:#7c8aff;--nc-bg:rgba(124,138,255,.1);--nc-bd:rgba(124,138,255,.25);
  --done:#10b981;--done-bg:rgba(16,185,129,.12);
  --active:#f59e0b;--active-bg:rgba(245,158,11,.1);--active-bd:rgba(245,158,11,.25);
  --warn:#fb923c;--danger:#fb7185;--danger-bg:rgba(251,113,133,.06);
  --blocked:#d946ef;--blocked-bg:rgba(217,70,239,.1);--blocked-bd:rgba(217,70,239,.25);
  --card-r:16px;
}
[data-theme="light"]{
  --bg0:#f0f2f8;--bg1:#ffffff;--bg2:#f5f7fb;--bg3:#e8ecf4;--bg4:#d0d6e2;
  --fg:#0f172a;--fg2:#334155;--fg3:#6b7280;--fg4:#9ca3af;
  --border:rgba(0,0,50,.06);--border2:rgba(0,0,50,.1);
  --glass:rgba(255,255,255,.7);--glass2:rgba(245,247,251,.6);
  --accent:#0891b2;--accent2:#0e7490;--accent-bg:rgba(8,145,178,.06);--accent-glow:rgba(8,145,178,.1);
  --docs:#059669;--docs-bg:rgba(5,150,105,.06);--docs-bd:rgba(5,150,105,.18);
  --nc:#6366f1;--nc-bg:rgba(99,102,241,.06);--nc-bd:rgba(99,102,241,.18);
  --done:#059669;--done-bg:rgba(5,150,105,.08);
  --active:#d97706;--active-bg:rgba(217,119,11,.06);--active-bd:rgba(217,119,11,.2);
}
/* ... 중략 (기존 스타일 코드와 동일하므로 지면 관계상 생략하지만, 실제 파일에는 전체가 포함됨) ... */
</style>
</head>
<body>
<div class="app">
  <div id="main-view">
    <header class="hdr">
      <div class="brand">
        <div class="brand-mark">N</div>
        <div>
          <h1>Novel Cockpit</h1>
          <div class="brand-sub">Creative Workspace</div>
        </div>
      </div>
      <div class="hdr-r">
        <button class="add-btn" onclick="addNovel()">+</button>
        <button class="icon-btn" onclick="showSettings()">⚙️</button>
        <div id="sync-badge" style="font-size:10px; font-weight:700;">LOCAL</div>
      </div>
    </header>
    <div id="ov-v" class="glass-panel"></div>
    <div id="wk-v" class="works-grid"></div>
  </div>
  <div id="det-v" class="hidden"></div>
</div>

<script>
// ===== [핵심 수정] GAS 연동 설정 =====
const API_URL = 'https://script.google.com/macros/s/AKfycbwvgIYcKLFj33pTGTS1mSICSiMowFRzwaLsSWQOEZVSwNzzUYRBoUyEdg7Ex1mGEc7W/exec'; // 👈 수정 필수
let SHEETS_ENABLED = true;

// 데이터 변수 (4개 테이블 구조)
let N = [];     // Novels
let S = [];     // Stages
let REFS = [];  // References
let PUBS = [];  // Publications (투고 현황)

// 동기화 상태 관리
let syncStatus = 'local';
let isSaving = false;
let pendingSave = false;

// ✅ 1. 시트에서 데이터 로드 (READ)
async function loadFromSheets(force = false) {
  if (!SHEETS_ENABLED || isSaving) return;
  
  syncStatus = 'syncing';
  updateSyncBadge();

  try {
    const res = await fetch(API_URL, {
      method: 'GET',
      redirect: 'follow' // 구글 리다이렉션 처리 필수
    });
    const data = await res.json();

    if (data.error) {
      console.error('로드 오류:', data.error);
      syncStatus = 'error';
      updateSyncBadge();
      return;
    }

    // 서버 데이터를 로컬 변수에 할당
    N = data.novels || [];
    S = data.stages || [];
    REFS = data.refs || [];
    PUBS = data.pubs || []; // 👈 PUBS 데이터 할당 추가

    R(); // 화면 다시 그리기
    syncStatus = 'synced';
  } catch (e) {
    console.warn('로드 실패:', e);
    syncStatus = 'error';
  }
  updateSyncBadge();
}

// ✅ 2. 시트에 데이터 저장 (WRITE)
async function saveToSheets() {
  if (!SHEETS_ENABLED || isSaving) return;

  isSaving = true;
  syncStatus = 'syncing';
  updateSyncBadge();

  // 서버로 보낼 데이터 묶음 (4개 테이블 모두 포함)
  const payload = {
    action: 'save_all',
    novels: N,
    stages: S,
    refs: REFS,
    pubs: PUBS // 👈 PUBS 데이터 전송 추가
  };

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      mode: 'cors',
      redirect: 'follow', // 👈 리다이렉션 처리 필수
      headers: { 'Content-Type': 'text/plain' }, // GAS POST 규칙
      body: JSON.stringify(payload)
    });
    
    const result = await res.json();
    if (result.ok) {
      syncStatus = 'synced';
    } else {
      syncStatus = 'error';
    }
  } catch (e) {
    console.error('저장 실패:', e);
    syncStatus = 'error';
  } finally {
    isSaving = false;
    updateSyncBadge();
  }
}

// ✅ 3. 동기화 배지 업데이트
function updateSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  const labels = { local: 'LOCAL', syncing: 'SYNC...', synced: 'SYNCED', error: 'OFFLINE' };
  const colors = { local: 'var(--fg4)', syncing: 'var(--active)', synced: 'var(--done)', error: 'var(--danger)' };
  el.textContent = labels[syncStatus];
  el.style.color = colors[syncStatus];
}

// 초기 로드 실행
window.addEventListener('DOMContentLoaded', () => {
  loadFromSheets(true);
});

// ... [기타 UI 렌더링(R), 모달 관리 등의 기존 함수들] ...
function R() {
  // 화면 렌더링 로직 (기존 코드 사용)
  console.log('Rendering components...');
  // 여기에 기존의 ov-v, wk-v 렌더링 코드를 넣으시면 됩니다.
}
</script>
</body>
</html>
