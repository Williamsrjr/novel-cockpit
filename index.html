<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Novel Cockpit</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#080c18;--bg1:#0c1222;--bg2:#111827;--bg3:#1a2236;--bg4:#243049;
  --fg:#e4e8f1;--fg2:#b4bdd0;--fg3:#6b7a94;--fg4:#3d4f68;
  --border:rgba(100,180,255,.06);--border2:rgba(100,180,255,.12);
  --glass:rgba(14,20,40,.65);--glass2:rgba(20,28,50,.5);
  --accent:#0ef;--accent2:#06b6d4;--accent-bg:rgba(0,238,255,.08);--accent-glow:rgba(0,238,255,.15);
  --docs:#2dd4a8;--docs-bg:rgba(45,212,168,.1);--docs-bd:rgba(45,212,168,.25);
  --nc:#7c8aff;--nc-bg:rgba(124,138,255,.1);--nc-bd:rgba(124,138,255,.25);
  --done:#10b981;--done-bg:rgba(16,185,129,.12);
  --active:#f59e0b;--active-bg:rgba(245,158,11,.1);--active-bd:rgba(245,158,11,.25);
  --warn:#fb923c;--danger:#fb7185;--danger-bg:rgba(251,113,133,.06);
  --blocked:#d946ef;--blocked-bg:rgba(217,70,239,.1);--blocked-bd:rgba(217,70,239,.25);
  --card-r:16px;
}
[data-theme="light"]{
  --bg0:#f0f2f8;--bg1:#ffffff;--bg2:#f5f7fb;--bg3:#e8ecf4;--bg4:#d0d6e2;
  --fg:#0f172a;--fg2:#334155;--fg3:#6b7280;--fg4:#9ca3af;
  --border:rgba(0,0,50,.06);--border2:rgba(0,0,50,.1);
  --glass:rgba(255,255,255,.7);--glass2:rgba(245,247,251,.6);
  --accent:#0891b2;--accent2:#0e7490;--accent-bg:rgba(8,145,178,.06);--accent-glow:rgba(8,145,178,.1);
  --docs:#059669;--docs-bg:rgba(5,150,105,.06);--docs-bd:rgba(5,150,105,.18);
  --nc:#6366f1;--nc-bg:rgba(99,102,241,.06);--nc-bd:rgba(99,102,241,.18);
  --done:#059669;--done-bg:rgba(5,150,105,.08);
  --active:#d97706;--active-bg:rgba(217,119,6,.06);--active-bd:rgba(217,119,6,.2);
}
[data-theme="light"] .ov-t thead th{color:#000;}
[data-theme="light"] .mob-label{color:#000;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Sora',sans-serif;background:var(--bg0);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;}
/* Dot grid background */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(100,180,255,.07) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 5%,rgba(0,238,255,.06),transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(124,138,255,.04),transparent 50%);pointer-events:none;z-index:0;}
.app{max-width:1140px;margin:0 auto;padding:24px 20px;position:relative;z-index:1;}

/* === HEADER === */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--nc));display:flex;align-items:center;justify-content:center;font-family:'Sora';font-size:20px;font-weight:800;color:#fff;box-shadow:0 0 20px var(--accent-glow);}
.brand h1{font-family:'Sora';font-size:24px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-sub{font-family:'Sora';font-size:12px;color:var(--fg3);margin-top:2px;-webkit-text-fill-color:var(--fg3);}
.hdr-r{display:flex;gap:8px;align-items:center;}
.add-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--accent);background:rgba(0,238,255,.08);color:var(--accent);cursor:pointer;font-size:22px;font-weight:400;font-family:'Sora';transition:all .2s;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.add-btn:hover{background:rgba(0,238,255,.18);box-shadow:0 0 16px var(--accent-glow);transform:translateY(-1px);}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border2);background:var(--glass2);color:var(--fg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;}
.icon-btn:hover{background:var(--bg3);color:var(--fg);border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow);}

/* Subtitle */
.page-sub{font-size:14px;color:var(--fg3);margin-bottom:24px;}

/* === NAV === */
.nav{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;align-items:center;}
.nav-tabs{display:flex;background:var(--glass);backdrop-filter:blur(16px);border-radius:12px;padding:3px;border:1px solid var(--border);}
.nav-t{padding:8px 18px;border:none;background:transparent;color:var(--fg3);cursor:pointer;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s;}
.nav-t.on{background:var(--bg4);color:var(--accent);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.nav-sep{width:1px;height:24px;background:var(--border2);margin:0 8px;}
.pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{padding:5px 12px;border:1px solid var(--border2);background:transparent;color:var(--fg3);cursor:pointer;border-radius:100px;font-size:11px;font-family:inherit;transition:all .15s;white-space:nowrap;font-weight:500;}
.pill:hover{border-color:var(--fg4);}
.pill.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:600;box-shadow:0 0 8px var(--accent-glow);}

/* Legend */
.legend{display:flex;gap:16px;margin-bottom:16px;font-size:10px;color:var(--fg4);align-items:center;flex-wrap:wrap;font-family:'Sora';font-weight:500;}
.lg-i{display:flex;align-items:center;gap:5px;}
.lg-d{width:14px;height:7px;border-radius:3px;}
.lg-hint{margin-left:auto;opacity:.6;font-size:9px;}

/* === GLASS PANEL === */
.glass-panel{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--card-r);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);}

/* === OVERVIEW TABLE === */
.ov-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ov-t{width:100%;min-width:880px;border-collapse:collapse;}
.ov-t thead th{font-family:'Sora';font-size:13px;color:#fff;font-weight:600;letter-spacing:-.01em;padding:16px 2px 12px;text-align:center;border-bottom:1px solid var(--border);background:rgba(10,16,30,.5);}
.ov-t thead th:first-child{text-align:left;padding-left:22px;min-width:170px;width:170px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--fg4);}
.ov-t thead th .si{display:none;}
.ov-t tbody tr{border-bottom:1px solid var(--border);transition:all .2s;}
.ov-t tbody tr:hover{background:rgba(0,238,255,.03);}
.ov-t tbody tr:last-child{border-bottom:none;}
.ov-t td{padding:12px 4px;text-align:center;vertical-align:middle;}
.ov-t td:first-child{text-align:left;padding-left:22px;}
.ov-nm{font-size:14px;font-weight:700;color:var(--fg);cursor:pointer;transition:color .15s;text-decoration:none;display:inline-block;}
.ov-nm:hover{color:var(--accent);}
.ov-nm.has-link{border-bottom:1px dashed var(--docs);}
.ov-sub{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.ov-tag{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--fg3);font-weight:500;}
.ov-start{font-size:9px;color:var(--fg4);margin-top:2px;font-family:'Sora';}

/* Cells */
.c{display:inline-flex;align-items:center;justify-content:center;width:84%;height:30px;border-radius:7px;cursor:pointer;position:relative;transition:all .2s;user-select:none;font-family:'Sora';}
.c:hover{transform:scale(1.12);}
.c.d.docs{background:var(--docs-bg);border:1px solid var(--docs-bd);}
.c.d.nc{background:var(--nc-bg);border:1px solid var(--nc-bd);}
.c.d.none{background:var(--done-bg);border:1px solid rgba(16,185,129,.18);}
.c.d.complete-done{background:rgba(34,211,238,.15);border:2px solid rgba(34,211,238,.4);}
.c.a{background:var(--active-bg);border:1px solid var(--active-bd);box-shadow:0 0 14px rgba(245,158,11,.12);}
.c.p{background:var(--bg3);border:1px solid var(--border);opacity:.3;}
.c.p:hover{opacity:.5;}
.c.p.empty{background:#6b7a94;border:2px solid var(--fg4);opacity:.7;color:var(--fg4);}
.c.b{background:var(--blocked-bg);border:1px solid var(--blocked-bd);}
.c.has-url{border-bottom-width:2px;}
.cl{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;}
.c.d.complete-done .cl{color:var(--accent);text-shadow:0 0 8px var(--accent-glow);}
.c.p .cl{color:transparent;}
.c.p.empty .cl{color:transparent;}
/* Tooltip */
.c-tip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;font-size:11px;color:var(--fg);z-index:20;pointer-events:none;box-shadow:0 16px 40px rgba(0,0,0,.5);min-width:150px;max-width:230px;white-space:normal;line-height:1.5;backdrop-filter:blur(16px);}
.c-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--border2);}
.c:hover .c-tip{display:block;}
.tip-stage{font-family:'Sora';font-weight:700;font-size:12px;margin-bottom:4px;}
.tip-memo{color:var(--fg2);font-size:11px;margin-bottom:6px;border-left:2px solid var(--active);padding-left:8px;}
.tip-due{font-family:'Sora';font-size:10px;color:var(--fg3);display:flex;align-items:center;gap:4px;}
.tip-due.soon{color:var(--warn);}
.tip-due.over{color:var(--danger);font-weight:600;}
.tip-status{font-family:'Sora';font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.tip-status.done{color:var(--done);}
.tip-status.active{color:var(--active);}
.tip-status.pending{color:var(--fg4);}
.tip-status.blocked{color:var(--blocked);}
.tip-no{color:var(--fg4);font-style:italic;}
.c-due{position:absolute;top:-7px;right:-8px;font-size:7px;background:var(--bg4);color:var(--fg3);padding:1px 5px;border-radius:4px;font-weight:600;white-space:nowrap;}

/* Urgency */
@keyframes bl1{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes bl2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bl3{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blc{0%,100%{box-shadow:0 0 0 rgba(251,113,133,0)}50%{box-shadow:0 0 16px rgba(251,113,133,.4)}}
.u1{animation:bl1 3s ease-in-out infinite;}
.u2{animation:bl2 1.5s ease-in-out infinite;}
.u3{animation:bl3 .8s ease-in-out infinite;}
.uc{animation:bl3 .4s ease-in-out infinite,blc .4s ease-in-out infinite;border-color:var(--danger)!important;}
.row-over{background:var(--danger-bg)!important;}
.over-badge{font-family:'Sora';font-size:8px;color:var(--danger);font-weight:800;margin-left:6px;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;background:var(--danger-bg);border-radius:4px;}

/* === MOBILE OVERVIEW === */
.mob-ov{display:none;}
.mob-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:14px;padding:18px;margin-bottom:12px;transition:all .2s;}
.mob-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mob-title{font-size:16px;font-weight:700;color:var(--fg);cursor:pointer;}
.mob-title.has-link{border-bottom:1px dashed var(--docs);}
.mob-badge{font-family:'Sora';font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--active-bg);color:var(--active);border:1px solid var(--active-bd);white-space:nowrap;}
.mob-tags{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap;}
.mob-tag{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--fg3);}
.mob-bar-wrap{margin-bottom:10px;}
.mob-labels{display:flex;gap:2px;margin-bottom:3px;}
.mob-label{flex:1;text-align:center;font-family:'Sora';font-size:11px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;}
.mob-bar{display:flex;gap:2px;}
.mob-seg{flex:1;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:7px;font-weight:800;font-family:'Sora';text-transform:uppercase;position:relative;transition:all .15s;color:#fff;}
.mob-seg:active{transform:scale(1.15);}
.mob-seg.d.docs{background:var(--docs-bg);border:1px solid var(--docs-bd);color:#fff;}
.mob-seg.d.nc{background:var(--nc-bg);border:1px solid var(--nc-bd);color:#fff;}
.mob-seg.d.none{background:var(--done-bg);border:1px solid rgba(16,185,129,.18);color:#fff;}
.mob-seg.a{background:var(--active-bg);border:1px solid var(--active-bd);color:#fff;}
.mob-seg.p{background:var(--bg3);border:1px solid var(--border);color:var(--fg4);opacity:.3;}
.mob-seg.p.empty{background:rgba(61,79,104,.25);border:2px solid var(--fg4);opacity:.45;color:transparent;}
.mob-seg.d.complete-done{background:rgba(34,211,238,.15);border:2px solid rgba(34,211,238,.4);color:var(--accent);}
.mob-seg.b{background:var(--blocked-bg);border:1px solid var(--blocked-bd);color:#fff;}
.mob-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:11px;margin-bottom:12px;}
.mob-info .k{color:var(--fg4);font-family:'Sora';font-size:9px;font-weight:600;text-transform:uppercase;}
.mob-info .v{color:var(--fg2);font-weight:500;}
.mob-info .v.warn{color:var(--warn);}
.mob-info .v.overdue{color:var(--danger);}
.mob-info .v.ok{color:var(--done);}
.mob-btns{display:flex;gap:5px;flex-wrap:wrap;}
.mob-btn{padding:6px 12px;border-radius:7px;font-size:10px;font-weight:600;color:#fff;text-decoration:none;font-family:'Sora';}
.mob-btn.docs{background:var(--docs);}
.mob-btn.drive{background:#0ea5e9;}
.mob-btn.nc{background:var(--nc);}
.mob-btn.ref{background:var(--bg4);color:var(--fg3);}

/* === WORKS SECTION TITLE === */
.sec-title{font-family:'Sora';font-size:18px;font-weight:700;color:var(--fg);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';display:inline-block;width:3px;height:18px;background:var(--accent);border-radius:2px;}

/* === WORKS CARDS === */
.cards-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
.wk{background:var(--glass);backdrop-filter:blur(20px);border-radius:var(--card-r);padding:22px;border:1px solid var(--border2);transition:all .3s;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.wk:hover{border-color:rgba(0,238,255,.2);transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 24px var(--accent-glow);}
.wk::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.wk.t-docs::before{background:linear-gradient(90deg,var(--docs),transparent);}
.wk.t-nc::before{background:linear-gradient(90deg,var(--nc),transparent);}
.wk-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.wk-t{font-family:'Sora';font-size:17px;font-weight:700;letter-spacing:-.3px;cursor:pointer;}
.wk-t.has-link{border-bottom:1px dashed var(--docs);}
.wk-bdg{font-family:'Sora';display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap;background:var(--active-bg);color:var(--active);border:1px solid var(--active-bd);}
.wk-tags{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.wk-tag{font-size:10px;padding:2px 8px;border-radius:100px;background:var(--bg3);color:var(--fg3);font-weight:500;}
.wk-prog{margin-bottom:14px;}
.wk-prog-bar{height:4px;background:var(--bg3);border-radius:8px;overflow:hidden;display:flex;}
.wk-pg-d{height:100%;background:var(--done);}
.wk-pg-a{height:100%;background:var(--active);}
.wk-prog-info{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--fg3);font-family:'Sora';font-weight:500;}
.wk-note{font-size:12px;color:var(--fg2);line-height:1.6;padding:10px 14px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--accent);margin-bottom:14px;}
.wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:14px;}
.wk-gi{display:flex;flex-direction:column;gap:1px;}
.wk-gl{font-family:'Sora';font-size:9px;color:var(--fg4);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.wk-gv{font-size:13px;color:var(--fg2);font-weight:500;}
.wk-gv.ok{color:var(--done);}
.wk-gv.warn{color:var(--warn);}
.wk-gv.overdue{color:var(--danger);}
.dl-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:4px 0 14px;}
.dl-fill{height:100%;border-radius:2px;}
.wk-btns{display:flex;gap:6px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border);}
.wk-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;color:#fff;text-decoration:none;transition:all .15s;font-family:'Sora';}
.wk-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.wk-btn.docs{background:var(--docs);}
.wk-btn.drive{background:#0ea5e9;}
.wk-btn.nc{background:var(--nc);}
.wk-btn.ref{background:var(--bg4);color:var(--fg3);}
.mob-works{display:none;}

/* === CONTEXT MENU === */
.ctx{position:fixed;z-index:300;background:var(--bg1);border:1px solid var(--border2);border-radius:14px;padding:6px;min-width:210px;box-shadow:0 20px 56px rgba(0,0,0,.5),0 0 1px rgba(0,238,255,.1);backdrop-filter:blur(24px);animation:ctx-in .15s ease;}
@keyframes ctx-in{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-title{font-family:'Sora';font-size:10px;color:var(--fg4);font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:6px 10px 4px;}
.ctx-sep{height:1px;background:var(--border);margin:4px 6px;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--fg2);transition:all .12s;}
.ctx-item:hover{background:var(--bg3);color:var(--fg);}
.ctx-item .ci-icon{font-size:14px;width:20px;text-align:center;}
.ctx-item .ci-label{flex:1;}
.ctx-item .ci-key{font-family:'Sora';font-size:9px;color:var(--fg4);font-weight:600;padding:2px 6px;background:var(--bg3);border-radius:4px;}
.ctx-item.active-item{color:var(--active);}
.ctx-item.done-item{color:var(--done);}
.ctx-item.blocked-item{color:var(--blocked);}

/* === MODAL === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:201;width:90%;max-width:400px;background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:30px;box-shadow:0 28px 72px rgba(0,0,0,.5);backdrop-filter:blur(24px);}
.modal h3{font-family:'Sora';font-size:18px;font-weight:700;margin-bottom:4px;}
.modal .sub{font-size:12px;color:var(--fg3);margin-bottom:20px;}
.modal label{display:block;font-size:11px;color:var(--fg4);font-weight:600;font-family:'Sora';text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:16px;}
.modal label:first-of-type{margin-top:0;}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--fg);font-size:13px;font-family:inherit;}
.modal textarea{resize:vertical;min-height:60px;line-height:1.5;}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 8px var(--accent-glow);}

// Convert Sheets flat data → N[] format
function sheetsToN(data){
  const novels=data.novels.map(row=>({
    id:row.id, title:row.title, tags:row.tags||[],
    cs:row.cs, len:row.len, sd:row.sd, ed:row.ed, dir:row.dir,
    links:{gdoc:row.gdoc||'',gdrive:row.gdrive||'',nc:row.nc||''},
    sl:{}, st:{}, refs:[], pubs:[], up:row.up
  }));
  // Fill stages
  novels.forEach(n=>{
    S.forEach(s=>{n.sl[s.id]={u:'',t:''};n.st[s.id]={s:'pending',n:'',d:''};});
    data.stages.filter(s=>s.novelId===n.id).forEach(s=>{
      n.st[s.stageId]={s:s.status||'pending',n:s.note||'',d:s.due||''};
      n.sl[s.stageId]={u:s.url||'',t:s.tool||''};
    });
    n.refs=data.refs.filter(r=>r.novelId===n.id).map(r=>({i:r.icon,n:r.name,d:r.desc,u:r.url}));
    n.pubs=(data.pubs||[]).filter(p=>p.novelId===n.id).map(p=>({name:p.name,url:p.url}));
    while(n.pubs.length<5)n.pubs.push({name:'',url:''});
  });
  return novels;
}

// Convert N[] → Sheets flat format
function nToSheets(novels){
  const novelsFlat=novels.map(n=>({
    id:n.id,title:n.title,tags:n.tags,cs:n.cs,len:n.len,sd:n.sd,ed:n.ed,dir:n.dir,
    links:n.links,up:n.up
  }));
  const stages=[];
  novels.forEach(n=>{
    S.forEach(s=>{
      const st=n.st[s.id]||{s:'pending',n:'',d:''};
      const sl=n.sl[s.id]||{u:'',t:''};
      stages.push({novelId:n.id,stageId:s.id,status:st.s,note:st.n,due:st.d,url:sl.u,tool:sl.t});
    });
  });
  const refs=[];
  novels.forEach(n=>{(n.refs||[]).forEach(r=>{refs.push({novelId:n.id,icon:r.i,name:r.n,desc:r.d,url:r.u});});});
  const pubs=[];
  novels.forEach(n=>{(n.pubs||[]).filter(p=>p.name||p.url).forEach(p=>{pubs.push({novelId:n.id,name:p.name,url:p.url});});});
  return{novels:novelsFlat,stages,refs,pubs};
}

// Fetch from Sheets (async, updates after page load)
let syncStatus='local';
function updateSyncBadge(){
  const el=document.getElementById('sync-badge');
  if(!el)return;
  const labels={local:'로컬',syncing:'동기화중…',synced:'✓ 동기화됨',error:'⚠ 오류'};
  const colors={local:'var(--fg4)',syncing:'var(--active)',synced:'var(--done)',error:'var(--danger)'};
  el.textContent=labels[syncStatus];el.style.color=colors[syncStatus];
}

let isSaving=false;
let hasLocalData=false;
try{hasLocalData=!!localStorage.getItem('nc_novels');}catch(e){}

async function loadFromSheets(force){
  if(!SHEETS_ENABLED||isSaving)return;
  if(hasLocalData&&!force)return;
  syncStatus='syncing';updateSyncBadge();
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    if(data.error){syncStatus='error';updateSyncBadge();return;}
    if(data.novels&&data.novels.length>0){
      // 로컬 pubs 데이터 백업
      const localPubs={};
      N.forEach(n=>{localPubs[n.id]=n.pubs||[];});
      
      // Sheets 데이터로 N 업데이트
      N=sheetsToN(data);
      
      // 로컬 pubs 데이터 복구 (Sheets에 없어도 유지)
      N.forEach(n=>{
        if(localPubs[n.id]&&localPubs[n.id].length>0){
          n.pubs=localPubs[n.id];
        }
      });
      
      localStorage.setItem('nc_novels',JSON.stringify(N));
      hasLocalData=true;
      R();syncStatus='synced';
    } else if(!hasLocalData){
      await saveToSheets();
      syncStatus='synced';
    } else {
      syncStatus='synced';
    }
  }catch(e){syncStatus='error';}
  updateSyncBadge();
}

async function saveToSheets(){
  if(!SHEETS_ENABLED)return;
  isSaving=true;
  syncStatus='syncing';updateSyncBadge();
  try{
    const payload={action:'save_all',...nToSheets(N)};
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    const result=await res.json();
    if(result.ok){syncStatus='synced';hasLocalData=true;}
    else syncStatus='error';
  }catch(e){syncStatus='error';}
  isSaving=false;
  updateSyncBadge();
}

// Debounced save
let saveTimer=null;
function persist(){
  try{localStorage.setItem('nc_novels',JSON.stringify(N));}catch(e){}
  hasLocalData=true;
  if(SHEETS_ENABLED){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>saveToSheets(),800);
  }
}

function uSD(nid,sid,v){N.find(x=>x.id===nid).st[sid].d=v;persist();R();}
function uND(nid,f,v){N.find(x=>x.id===nid)[f]=v;persist();R();rSet();}
function rSet(){let h=`<div class="sp-h"><h2>⚙️ 관리</h2><button class="sp-x" onclick="closeSet()">✕</button></div><div class="sp-sec"><div class="sp-st">🎨 화면</div><div class="sp-row"><div><div class="sp-lbl">다크 모드</div></div><label class="tog"><input type="checkbox" ${dk?'checked':''} onchange="togTheme()"><span class="tog-s"></span></label></div></div><div class="sp-sec"><div class="sp-st">📋 작품 관리</div><table class="mt"><thead><tr><th>작품</th><th>현재</th><th>시작일</th><th>목표일</th><th></th></tr></thead><tbody>`;
  N.forEach(n=>{const cs=S.find(x=>x.id===n.cs);const isE=ex.has(n.id);h+=`<tr><td><span class="mt-t">${n.title}</span></td><td><span class="sdot ${n.st[n.cs].s}"></span> ${cs.l}</td><td><input type="date" class="mt-i" value="${n.sd}" onchange="uND(${n.id},'sd',this.value)"></td><td><input type="date" class="mt-i" value="${n.ed}" onchange="uND(${n.id},'ed',this.value)"></td><td><button class="eb" onclick="tExp(${n.id})">${isE?'접기':'▾'}</button></td></tr>`;if(isE){h+=`<tr><td colspan="5" style="padding:0 0 6px"><div class="se-w"><div class="se-r se-hd"><div>단계</div><div>상태</div><div>마감일</div></div>`;S.forEach(st=>{const info=n.st[st.id];h+=`<div class="se-r"><div class="se-n"><span class="sdot ${info.s}"></span>${st.i} ${st.l}</div><div><select class="se-sel" onchange="uSS(${n.id},'${st.id}',this.value)"><option value="pending" ${info.s==='pending'?'selected':''}>대기</option><option value="active" ${info.s==='active'?'selected':''}>진행중</option><option value="done" ${info.s==='done'?'selected':''}>완료</option><option value="blocked" ${info.s==='blocked'?'selected':''}>막힘</option></select></div><div><input type="date" class="se-di" value="${info.d||''}" onchange="uSD(${n.id},'${st.id}',this.value)"></div></div>`;});h+=`</div></td></tr>`;}});
  h+=`</tbody></table></div><div class="sp-sec"><div class="sp-st">☁️ Google Sheets 동기화</div><div class="sp-row"><div><div class="sp-lbl">상태</div><div class="sp-desc">${SHEETS_ENABLED?'연결됨 — '+API_URL.slice(0,50)+'…':'❌ 미설정 — HTML에서 API_URL을 설정하세요'}</div></div>${SHEETS_ENABLED?`<button class="m-btn m-ok" style="padding:6px 14px;font-size:12px" onclick="manualSync()">수동 동기화</button>`:''}</div></div><div class="sp-sec"><div class="sp-st">🔧 기타</div><div class="sp-row"><div><div class="sp-lbl">마감 깜박임</div></div><label class="tog"><input type="checkbox" checked><span class="tog-s"></span></label></div><div class="sp-row"><div><div class="sp-lbl">완료 숨기기</div></div><label class="tog"><input type="checkbox"><span class="tog-s"></span></label></div><div class="sp-row"><div><div class="sp-lbl" style="color:var(--danger)">데이터 초기화</div><div class="sp-desc">모든 수정사항을 샘플 데이터로 리셋</div></div><button class="m-btn" style="background:var(--danger);color:#fff;padding:6px 14px;font-size:12px" onclick="resetData()">리셋</button></div></div>`;
  document.getElementById('set-p').innerHTML=h;}

// Detail
function showDet(id){const n=N.find(x=>x.id===id);document.getElementById('main-view').classList.add('hidden');const dv=document.getElementById('det-v');dv.classList.remove('hidden');
  let lk='';if(n.links.gdoc)lk+=`<a href="${n.links.gdoc}" target="_blank" class="d-lk docs">📄 Docs</a>`;if(n.links.gdrive)lk+=`<a href="${n.links.gdrive}" target="_blank" class="d-lk drive">📁 Drive</a>`;if(n.links.nc)lk+=`<a href="${n.links.nc}" target="_blank" class="d-lk nc">✒️ NC</a>`;
  let tl='';S.forEach((st,i)=>{const info=n.st[st.id];const isC=n.cs===st.id;const dc=info.s==='done'?'done':info.s==='blocked'?'blocked':isC?'active':'pending';const dot=info.s==='done'?'✓':info.s==='blocked'?'⊘':isC?st.i:(i+1);const lc=info.s==='done'?'done':'pending';const cc=isC?'as':info.s==='blocked'?'bs':info.s==='pending'?'ps':'';const stxt=info.s==='done'?'완료':info.s==='active'?'진행중':info.s==='blocked'?'막힘':'대기';const sl=n.sl[st.id];let tlk='';if(sl&&sl.u){const tc=sl.t==='nc'?'nc':'docs';tlk=`<a href="${sl.u}" target="_blank" class="tl-tl ${tc}">${sl.t==='nc'?'NC':'Docs'} →</a>`;}const dueI=info.d?` <span style="font-size:10px;color:var(--fg4);font-family:Sora">📅${info.d}</span>`:'';tl+=`<div class="tl-i"><div class="tl-l"><div class="tl-d ${dc}">${dot}</div>${i<S.length-1?`<div class="tl-ln ${lc}"></div>`:''}</div><div class="tl-b ${cc}"><div class="tl-r"><span class="n">${st.l} ${tlk}${dueI}</span><span class="st ${info.s}">${stxt}</span></div>${info.n?`<div class="tl-note">${info.n}</div>`:''}</div></div>`;});
  let refs=`<div class="ref-s"><h3>📎 참고자료</h3>`;if(!n.refs||!n.refs.length)refs+=`<div class="ref-empty">없음</div>`;else{refs+=`<div class="ref-l">`;n.refs.forEach(r=>{refs+=`<div class="ref-c"><span style="font-size:20px">${r.i}</span><div style="flex:1"><div class="rn">${r.n}</div><div class="rd">${r.d}</div></div><a href="${r.u}" target="_blank">열기</a></div>`;});refs+=`</div>`;}refs+=`</div>`;
  dv.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><button class="back" onclick="hideDet()">← 돌아가기</button><button class="icon-btn" onclick="hideDet();titleDbl(null,${id})" title="편집" style="font-size:14px">✏️</button></div><div class="dt">${n.title}</div><div class="d-tags">${n.tags.map(t=>`<span class="d-tag">${t}</span>`).join('')}</div><div class="d-meta"><span>분량 ${n.len}</span><span>시작 ${n.sd}</span><span>목표 ${n.ed}</span></div><div class="d-links">${lk}</div>${tl}${refs}`;}
function hideDet(){document.getElementById('det-v').classList.add('hidden');document.getElementById('main-view').classList.remove('hidden');}

// Tooltip
function tipHtml(n,st,info){const statusLabels={done:'완료',active:'진행중',pending:'대기',blocked:'막힘'};let h=`<div class="tip-stage">${st.i} ${st.l}</div><div class="tip-status ${info.s}">${statusLabels[info.s]}</div>`;if(info.n)h+=`<div class="tip-memo">${info.n}</div>`;if(info.d){const days=dab(TD,new Date(info.d));const cls=days<0?'over':days<=5?'soon':'';const txt=days<0?`${Math.abs(days)}일 초과`:`${days}일 남음`;h+=`<div class="tip-due ${cls}">📅 ${info.d} (${txt})</div>`;}if(!info.n&&!info.d)h+=`<div class="tip-no">메모 없음</div>`;return h;}

// Render
function R(){
  const ns=gf();const ac=N.filter(n=>!["complete","publishing"].includes(n.cs)).length;
  document.getElementById('stats').textContent=`${N.length} projects · ${ac} active`;

  // Desktop Overview
  let o=`<div class="glass-panel ov-wrap"><table class="ov-t"><thead><tr><th>작품</th>${S.map(s=>`<th>${s.l}</th>`).join('')}</tr></thead><tbody>`;
  ns.forEach(n=>{let rU='';S.forEach(st=>{const info=n.st[st.id];if(info.s==='active'&&info.d){const u=uc(info.d);if(u==='uc'||u==='u3')rU='row-over';}});const dl=dli(n);const oB=dl.st==='overdue'?'<span class="over-badge">OVERDUE</span>':'';const hasDir=!!n.dir;
    o+=`<tr class="${rU}"><td><span class="ov-nm ${hasDir?'has-link':''}" onclick="handleTitle(event,${n.id})">${n.title}</span>${oB}${n.sd?`<div class="ov-start">${n.sd} ~</div>`:''}<div class="ov-sub">${n.tags.map(t=>`<span class="ov-tag">${t}</span>`).join('')}</div></td>`;
    S.forEach(st=>{const info=n.st[st.id];const sl=n.sl[st.id];const tc=sl&&sl.t==='nc'?'nc':sl&&(sl.t==='gdoc'||sl.t==='gdrive')?'docs':'none';const isE=!sl?.u&&!info.n;let cc='c ';if(info.s==='done'){if(st.id==='complete')cc+='d complete-done';else cc+=`d ${tc}${sl&&sl.u?' has-url':''}`;}else if(info.s==='active')cc+=`a ${uc(info.d)}`;else if(info.s==='blocked')cc+='b';else cc+=`p${isE?' empty':''}`;let lb='';if(st.id==='complete'&&info.s==='done')lb='DONE';else if(st.id==='publishing'){const pc=(n.pubs||[]).filter(p=>p.name&&p.url).length;if(info.s==='active')lb='NOW';else if(pc>0)lb=pc+'곳';}else{if(info.s==='active')lb='NOW';else if(info.s==='blocked')lb='BLOCK';else if(info.s==='done'&&sl&&sl.t)lb=TL[sl.t]||'';}const dueTag=info.d?`<span class="c-due">📅${info.d.slice(5)}</span>`:'';o+=`<td><div class="${cc}" onclick="handleCell(event,${n.id},'${st.id}')" oncontextmenu="showCtx(event,${n.id},'${st.id}')"><span class="cl">${lb}</span><div class="c-tip">${tipHtml(n,st,info)}</div>${dueTag}</div></td>`;});o+=`</tr>`;});
  o+=`</tbody></table></div>`;

  // Mobile Overview
  let mo='<div class="mob-ov">';
  ns.forEach(n=>{const dl=dli(n);const cs=S.find(x=>x.id===n.cs);const hasDir=!!n.dir;const dlTxt=dl.r<0?`${Math.abs(dl.r)}일 초과`:`${dl.r}일 남음`;const aD=n.st[n.cs]?.d||'';const uCls=uc(aD);let btns='';if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="mob-btn docs">Docs</a>`;if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="mob-btn drive">Drive</a>`;if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="mob-btn nc">NC</a>`;if(n.refs&&n.refs.length)btns+=`<span class="mob-btn ref" onclick="event.stopPropagation();showDet(${n.id})">📎${n.refs.length}</span>`;
    mo+=`<div class="mob-card ${uCls}" onclick="showDet(${n.id})"><div class="mob-top"><span class="mob-title ${hasDir?'has-link':''}" onclick="event.stopPropagation();handleTitle(event,${n.id})">${n.title}</span><span class="mob-badge">${cs.i} ${cs.l}</span></div><div class="mob-tags">${n.tags.map(t=>`<span class="mob-tag">${t}</span>`).join('')}</div><div class="mob-bar-wrap"><div class="mob-labels">${S.map(s=>`<div class="mob-label">${s.l}</div>`).join('')}</div><div class="mob-bar">${S.map(st=>{const info=n.st[st.id];const sl=n.sl[st.id];const tc=sl&&sl.t==='nc'?'nc':sl&&(sl.t==='gdoc'||sl.t==='gdrive')?'docs':'none';let sc='mob-seg ';const mIsE=!sl?.u&&!info.n;if(info.s==='done'){if(st.id==='complete')sc+='d complete-done';else sc+=`d ${tc}`;}else if(info.s==='active')sc+='a';else if(info.s==='blocked')sc+='b';else sc+=`p${mIsE?' empty':''}`;const lb=st.id==='complete'&&info.s==='done'?'DONE':info.s==='active'?'NOW':info.s==='blocked'?'BLK':info.s==='done'&&sl&&sl.t?(TL[sl.t]||''):'';return `<div class="${sc}" onclick="event.stopPropagation();handleCell(event,${n.id},'${st.id}')" oncontextmenu="showCtx(event,${n.id},'${st.id}')">${lb}</div>`;}).join('')}</div></div><div class="mob-info"><div><span class="k">남은 기간</span><div class="v ${dl.st}">${dlTxt}</div></div><div><span class="k">진행</span><div class="v">${gp(n)}%</div></div><div><span class="k">분량</span><div class="v">${n.len}</div></div>${aD?`<div><span class="k">마감</span><div class="v ${dab(TD,new Date(aD))<0?'overdue':dab(TD,new Date(aD))<=5?'warn':'ok'}">${aD}</div></div>`:''}</div><div class="mob-btns" onclick="event.stopPropagation()">${btns}</div></div>`;});
  mo+='</div>';
  document.getElementById('ov-v').innerHTML=o+mo;

  // Desktop Works
  let w=`<div class="sec-title">진행 상세 분석</div><div class="cards-grid">`;
  ns.forEach(n=>{const prog=gp(n);const cs=S.find(x=>x.id===n.cs);const ci=si(n.cs);const dW=Math.round((ci/S.length)*100);const aW=Math.round((1/S.length)*100);const note=n.st[n.cs]?.n||'';const dl=dli(n);const dlC=dl.st==='overdue'?'var(--danger)':dl.st==='warn'?'var(--warn)':'var(--done)';const dlT=dl.r<0?`${Math.abs(dl.r)}일 초과`:`${dl.r}일 남음`;const rC=n.refs?n.refs.length:0;const sl=n.sl[n.cs];const tC=sl&&sl.t==='nc'?'t-nc':'t-docs';const aD=n.st[n.cs]?.d||'';const uCls=uc(aD);const hasDir=!!n.dir;let btns='';if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="wk-btn docs" onclick="event.stopPropagation()">📄 Docs</a>`;if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="wk-btn drive" onclick="event.stopPropagation()">📁 Drive</a>`;if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="wk-btn nc" onclick="event.stopPropagation()">✒️ NC</a>`;if(rC)btns+=`<span class="wk-btn ref" onclick="event.stopPropagation();showDet(${n.id})">📎 ${rC}</span>`;const dueI=aD?`<div class="wk-gi"><span class="wk-gl">현 단계 마감</span><span class="wk-gv ${dab(TD,new Date(aD))<0?'overdue':dab(TD,new Date(aD))<=5?'warn':'ok'}">${aD}</span></div>`:'';
    w+=`<div class="wk ${tC} ${uCls}" onclick="showDet(${n.id})"><div class="wk-top"><div class="wk-t ${hasDir?'has-link':''}" onclick="event.stopPropagation();handleTitle(event,${n.id})">${n.title}</div><div class="wk-bdg">${cs.i} ${cs.l}</div></div><div class="wk-tags">${n.tags.map(t=>`<span class="wk-tag">${t}</span>`).join('')}</div><div class="wk-prog"><div class="wk-prog-bar"><div class="wk-pg-d" style="width:${dW}%"></div><div class="wk-pg-a" style="width:${aW}%"></div></div><div class="wk-prog-info"><span>전척도 ${prog}%</span><span>일정 ${dl.p}%</span></div></div>${note?`<div class="wk-note">${note}</div>`:''}<div class="wk-grid"><div class="wk-gi"><span class="wk-gl">분량</span><span class="wk-gv">${n.len}</span></div><div class="wk-gi"><span class="wk-gl">시작일</span><span class="wk-gv">${n.sd}</span></div><div class="wk-gi"><span class="wk-gl">목표</span><span class="wk-gv">${n.ed}</span></div><div class="wk-gi"><span class="wk-gl">남은 기간</span><span class="wk-gv ${dl.st}">${dlT}</span></div>${dueI}</div><div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--fg4);margin-bottom:3px;font-family:Sora"><span>일정</span><span style="color:${dlC}">${dl.p}%</span></div><div class="dl-bar"><div class="dl-fill" style="width:${dl.p}%;background:${dlC}"></div></div></div><div class="wk-btns">${btns}</div></div>`;});
  w+='</div>';

  // Mobile Works
  let mw='<div class="mob-works">';
  ns.forEach(n=>{const cs=S.find(x=>x.id===n.cs);const dl=dli(n);const aD=n.st[n.cs]?.d||'';const uCls=uc(aD);const hasDir=!!n.dir;const dlT=dl.r<0?`${Math.abs(dl.r)}일 초과`:`${dl.r}일 남음`;const note=n.st[n.cs]?.n||'';let btns='';if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="mob-btn docs">Docs</a>`;if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="mob-btn drive">Drive</a>`;if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="mob-btn nc">NC</a>`;if(n.refs&&n.refs.length)btns+=`<span class="mob-btn ref" onclick="event.stopPropagation();showDet(${n.id})">📎${n.refs.length}</span>`;
    mw+=`<div class="mob-card ${uCls}" onclick="showDet(${n.id})"><div class="mob-top"><span class="mob-title ${hasDir?'has-link':''}" onclick="event.stopPropagation();handleTitle(event,${n.id})">${n.title}</span><span class="mob-badge">${cs.i} ${cs.l}</span></div><div class="mob-tags">${n.tags.map(t=>`<span class="mob-tag">${t}</span>`).join('')}</div>${note?`<div class="wk-note" style="font-size:11px;padding:8px 10px;margin-bottom:8px">${note}</div>`:''}<div class="mob-info"><div><span class="k">진행</span><div class="v">${gp(n)}% · 일정 ${dl.p}%</div></div><div><span class="k">남은 기간</span><div class="v ${dl.st}">${dlT}</div></div><div><span class="k">분량</span><div class="v">${n.len}</div></div>${aD?`<div><span class="k">마감</span><div class="v ${dab(TD,new Date(aD))<0?'overdue':dab(TD,new Date(aD))<=5?'warn':'ok'}">${aD}</div></div>`:''}</div><div class="mob-btns" onclick="event.stopPropagation()">${btns}</div></div>`;});
  mw+='</div>';
  document.getElementById('wk-v').innerHTML=w+mw;
}

rp();R();
if(!dk)document.getElementById('thbtn').textContent='☀️';
updateSyncBadge();
loadFromSheets();
if(hasLocalData&&SHEETS_ENABLED){setTimeout(()=>saveToSheets(),2000);}
</script>
