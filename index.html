<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Novel Cockpit</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#080c18;--bg1:#0c1222;--bg2:#111827;--bg3:#1a2236;--bg4:#243049;
  --fg:#e4e8f1;--fg2:#b4bdd0;--fg3:#6b7a94;--fg4:#3d4f68;
  --border:rgba(100,180,255,.06);--border2:rgba(100,180,255,.12);
  --glass:rgba(14,20,40,.65);--glass2:rgba(20,28,50,.5);
  --accent:#0ef;--accent2:#06b6d4;--accent-bg:rgba(0,238,255,.08);--accent-glow:rgba(0,238,255,.15);
  --docs:#2dd4a8;--docs-bg:rgba(45,212,168,.1);--docs-bd:rgba(45,212,168,.25);
  --nc:#7c8aff;--nc-bg:rgba(124,138,255,.1);--nc-bd:rgba(124,138,255,.25);
  --done:#10b981;--done-bg:rgba(16,185,129,.12);
  --active:#f59e0b;--active-bg:rgba(245,158,11,.1);--active-bd:rgba(245,158,11,.25);
  --warn:#fb923c;--danger:#fb7185;--danger-bg:rgba(251,113,133,.06);
  --blocked:#d946ef;--blocked-bg:rgba(217,70,239,.1);--blocked-bd:rgba(217,70,239,.25);
  --card-r:16px;
}
[data-theme="light"]{
  --bg0:#f0f2f8;--bg1:#ffffff;--bg2:#f5f7fb;--bg3:#e8ecf4;--bg4:#d0d6e2;
  --fg:#0f172a;--fg2:#334155;--fg3:#6b7280;--fg4:#9ca3af;
  --border:rgba(0,0,50,.06);--border2:rgba(0,0,50,.1);
  --glass:rgba(255,255,255,.7);--glass2:rgba(245,247,251,.6);
  --accent:#0891b2;--accent2:#0e7490;--accent-bg:rgba(8,145,178,.06);--accent-glow:rgba(8,145,178,.1);
  --docs:#059669;--docs-bg:rgba(5,150,105,.06);--docs-bd:rgba(5,150,105,.18);
  --nc:#6366f1;--nc-bg:rgba(99,102,241,.06);--nc-bd:rgba(99,102,241,.18);
  --done:#059669;--done-bg:rgba(5,150,105,.08);
  --active:#d97706;--active-bg:rgba(217,119,6,.06);--active-bd:rgba(217,119,6,.2);
}
[data-theme="light"] .ov-t thead th{color:#000;}
[data-theme="light"] .mob-label{color:#000;}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Sora',sans-serif;background:var(--bg0);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(100,180,255,.07) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 5%,rgba(0,238,255,.06),transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(124,138,255,.04),transparent 50%);pointer-events:none;z-index:0;}

/* ==================== 주요 수정 부분 ==================== */
/* 전체 페이지 스크롤 + 여백 */
body, html {
  height: 100%;
  overflow-y: auto;
}

.app {
  max-width:1140px;
  margin:0 auto;
  padding:24px 20px;
  position:relative;
  z-index:1;
  min-height: 100vh;
  padding-bottom: 80px;   /* 하단 여유 공간 */
}

/* 상단 헤더 고정 */
.hdr {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--bg0);
  padding: 16px 20px 8px 20px;
  margin: -24px -20px 16px -20px;
  border-bottom: 1px solid var(--border2);
  backdrop-filter: blur(16px);
}

/* ov-wrap - 내부 스크롤 제거, 전체 스크롤 허용 */
.ov-wrap{
  overflow-x: auto;
  overflow-y: visible;
  max-height: none;
}

/* 테이블 헤더 고정 (상단 헤더 바로 아래) */
.ov-t thead th {
  position: sticky;
  top: 78px;                    /* 상단 헤더 높이만큼 내려서 고정 */
  z-index: 100;
  background: rgba(10,16,30,.95);
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 8px rgba(0,0,0,.2);
}

/* 첫 번째 열(작품 컬럼)도 고정 */
.ov-t thead th:first-child {
  z-index: 110;
  left: 0;
  background: rgba(10,16,30,.95);
}
/* ==================== 여기까지 주요 수정 ==================== */

.ov-t{width:100%;min-width:880px;border-collapse:collapse;}
.ov-t thead th{font-family:'Sora';font-size:13px;color:#fff;font-weight:600;letter-spacing:-.01em;padding:10px 2px 8px;text-align:center;border-bottom:1px solid var(--border);}
.ov-t tbody tr{border-bottom:1px solid var(--border);transition:all .2s; cursor: grab;}
.ov-t tbody tr:hover{background:rgba(0,238,255,.03);}
.ov-t tbody tr:active{cursor: grabbing;}
.ov-t td{padding:6px 2px;text-align:center;vertical-align:middle;}
.ov-t td:first-child{text-align:left;padding-left:22px;}
.ov-nm{font-size:14px;font-weight:700;color:var(--fg);cursor:pointer;transition:color .15s;text-decoration:none;display:inline-block;}
.ov-nm:hover{color:var(--accent);}
.ov-nm.has-link{border-bottom:1px dashed var(--docs);}
.ov-sub{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.ov-tag{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--fg3);font-weight:500;}
.ov-start{font-size:9px;color:var(--fg4);margin-top:2px;font-family:'Sora';}

.c{display:inline-flex;align-items:center;justify-content:center;width:84%;height:30px;border-radius:7px;cursor:pointer;position:relative;transition:all .2s;user-select:none;font-family:'Sora';}
.c:hover{transform:scale(1.12);}
.c.d.docs{background:var(--docs-bg);border:1px solid var(--docs-bd);}
.c.d.nc{background:var(--nc-bg);border:1px solid var(--nc-bd);}
.c.d.none{background:var(--done-bg);border:1px solid rgba(16,185,129,.18);}
.c.d.complete-done{background:rgba(34,211,238,.15);border:2px solid rgba(34,211,238,.4);}
.c.a{background:var(--active-bg);border:1px solid var(--active-bd);box-shadow:0 0 14px rgba(245,158,11,.12);}
.c.p{background:var(--bg3);border:1px solid var(--border);opacity:.3;}
.c.p:hover{opacity:.5;}
.c.p.empty{background:#6b7a94;border:2px solid var(--fg4);opacity:.7;color:var(--fg4);}
.c.b{background:var(--blocked-bg);border:1px solid var(--blocked-bd);}
.c.has-url{border-bottom-width:2px;}
.cl{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;}
.c.d.complete-done .cl{color:var(--accent);text-shadow:0 0 8px var(--accent-glow);}
.c.p .cl{color:transparent;}
.c.p.empty .cl{color:transparent;}
.c-tip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;font-size:11px;color:var(--fg);z-index:20;pointer-events:none;box-shadow:0 16px 40px rgba(0,0,0,.5);min-width:150px;max-width:230px;white-space:normal;line-height:1.5;backdrop-filter:blur(16px);}
.c-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--border2);}
.c:hover .c-tip{display:block;}
.tip-stage{font-family:'Sora';font-weight:700;font-size:12px;margin-bottom:4px;}
.tip-memo{color:var(--fg2);font-size:11px;margin-bottom:6px;border-left:2px solid var(--active);padding-left:8px;}
.tip-due{font-family:'Sora';font-size:10px;color:var(--fg3);display:flex;align-items:center;gap:4px;}
.tip-due.soon{color:var(--warn);}
.tip-due.over{color:var(--danger);font-weight:600;}
.tip-status{font-family:'Sora';font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.tip-status.done{color:var(--done);}
.tip-status.active{color:var(--active);}
.tip-status.pending{color:var(--fg4);}
.tip-status.blocked{color:var(--blocked);}
.tip-no{color:var(--fg4);font-style:italic;}
.c-due{position:absolute;top:-7px;right:-8px;font-size:7px;background:var(--bg4);color:var(--fg3);padding:1px 5px;border-radius:4px;font-weight:600;white-space:nowrap;}

.glass-panel{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--card-r);overflow:visible;box-shadow:0 8px 32px rgba(0,0,0,.2);}

/* 나머지 스타일은 기존과 동일 */
.legend{display:flex;gap:16px;margin-bottom:16px;font-size:10px;color:var(--fg4);align-items:center;flex-wrap:wrap;font-family:'Sora';font-weight:500;}
.lg-i{display:flex;align-items:center;gap:5px;}
.lg-d{width:14px;height:7px;border-radius:3px;}
.lg-hint{margin-left:auto;opacity:.6;font-size:9px;}

@keyframes bl1{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes bl2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bl3{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blc{0%,100%{box-shadow:0 0 0 rgba(251,113,133,0)}50%{box-shadow:0 0 16px rgba(251,113,133,.4)}}
.u1{animation:bl1 3s ease-in-out infinite;}
.u2{animation:bl2 1.5s ease-in-out infinite;}
.u3{animation:bl3 .8s ease-in-out infinite;}
.uc{animation:bl3 .4s ease-in-out infinite,blc .4s ease-in-out infinite;border-color:var(--danger)!important;}
.row-over{background:var(--danger-bg)!important;}
.over-badge{font-family:'Sora';font-size:8px;color:var(--danger);font-weight:800;margin-left:6px;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;background:var(--danger-bg);border-radius:4px;}

/* 모바일 */
.mob-ov{display:none;}
@media(max-width:768px){
  .app{padding:16px 12px;}
  .brand h1{font-size:20px;}
  .brand-mark{width:36px;height:36px;font-size:17px;}
  .nav-sep{display:none;}
  .legend .lg-hint{display:none;}
  .ov-wrap{display:none!important;}
  .mob-ov{display:block!important;}
  .cards-grid{display:none!important;}
  .mob-works{display:block!important;}
  .dt{font-size:22px;}
  .sp{padding:22px 16px;}
  .se-r{grid-template-columns:1fr 70px 100px;}
  .hdr {
    padding: 12px 12px 8px 12px;
    margin: -16px -12px 12px -12px;
  }
  .ov-t thead th {
    top: 68px;   /* 모바일에서는 헤더 높이가 낮아짐 */
  }
}
@media(max-width:480px){
  .hdr{flex-direction:column;align-items:flex-start;gap:12px;}
  .hdr-r{align-self:flex-end;margin-top:-48px;}
}

/* 이하 기존 스타일들 (변경 없음) */
.sec-title{font-family:'Sora';font-size:18px;font-weight:700;color:var(--fg);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';display:inline-block;width:3px;height:18px;background:var(--accent);border-radius:2px;}
.cards-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
/* ... (중간 생략 - 기존 코드 그대로 유지) ... */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 24px;font-size:12px;color:var(--fg);z-index:999;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:toast-in .3s ease,toast-out .3s ease 1.7s forwards;font-family:'Sora';font-weight:500;backdrop-filter:blur(12px);}
.hidden{display:none!important;}
body.no-blink .u1,body.no-blink .u2,body.no-blink .u3,body.no-blink .uc{animation:none!important;}
</style>

<body>

  <div id="main-view">

<div id="modal-bg" class="modal-bg hidden" onclick="closeModal()"></div>
<div id="modal" class="modal hidden"></div>

<script>
const S=[{id:"ideation",l:"착상",i:"💡"},{id:"structure",l:"구조설계",i:"🏗"},{id:"story",l:"BG",i:"🧬"},{id:"scene_structure",l:"씬구조",i:"🎬"},{id:"scene_beat",l:"씬비트",i:"🥁"},{id:"draft",l:"초고",i:"✍️"},{id:"revision",l:"퇴고",i:"🔄"},{id:"complete",l:"교정교열",i:"✅"},{id:"publishing",l:"발행",i:"📡"}];
const TAGS=["SF","문학","에세이","BL","야설","에로","판타지","엽편","단편","중편","장편"];
const TL={gdoc:'Docs',nc:'NC',gdrive:'Drive'};
let N=[];
const API_URL = 'https://script.google.com/macros/s/AKfycbwvgIYcKLFj33pTGTS1mSICSiMowFRzwaLsSWQOEZVSwNzzUYRBoUyEdg7Ex1mGEc7W/exec';
const SHEETS_ENABLED = API_URL !== 'YOUR_APPS_SCRIPT_URL';

function fmtD(v){if(!v||v==='NaN'||v==='undefined'||v==='null')return'';const s=String(v).trim();if(!s)return'';const iso=/^\d{4}-\d{2}-\d{2}/.exec(s);if(iso)return iso;const d=new Date(s);if(isNaN(d.getTime()))return'';return d.toISOString().slice(0,10);}
function clV(v){return(!v||v==='NaN'||v==='undefined'||v==='null')?'':String(v);}
function sheetsToN(data){
  const novels=data.novels.map(row=>({
    id:row.id, title:row.title, tags:Array.isArray(row.tags)?row.tags:(typeof row.tags==='string'&&row.tags&&row.tags!=='NaN'?row.tags.split(',').map(t=>t.trim()):[]),
    cs:clV(row.cs)||'ideation', len:clV(row.len), sd:fmtD(row.sd), ed:fmtD(row.ed), dir:clV(row.dir),
    links:{gdoc:clV(row.gdoc),gdrive:clV(row.gdrive),nc:clV(row.nc)},
    sl:{}, st:{}, refs:[], pubs:[], up:fmtD(row.up)
  }));
  novels.forEach(n=>{
    S.forEach(s=>{n.sl[s.id]={u:'',t:''};n.st[s.id]={s:'pending',n:'',d:''};});
    data.stages.filter(s=>s.novelId===n.id).forEach(s=>{
      n.st[s.stageId]={s:clV(s.status)||'pending',n:clV(s.note),d:fmtD(s.due)};
      n.sl[s.stageId]={u:clV(s.url),t:clV(s.tool)};
    });
    n.refs=data.refs.filter(r=>r.novelId===n.id).map(r=>({i:clV(r.icon),n:clV(r.name),d:clV(r.desc),u:clV(r.url)}));
    n.pubs=(data.pubs||[]).filter(p=>p.novelId===n.id).map(p=>({name:clV(p.name),url:clV(p.url)}));
    while(n.pubs.length<5)n.pubs.push({name:'',url:''});
  });
  return novels;
}

function nToSheets(novels){
  const novelsFlat=novels.map(n=>({
    id:n.id,title:n.title,tags:n.tags,cs:n.cs,len:n.len,sd:n.sd,ed:n.ed,dir:n.dir,
    gdoc:n.links.gdoc||'',gdrive:n.links.gdrive||'',nc:n.links.nc||'',up:n.up
  }));
  const stages=[];
  novels.forEach(n=>{
    S.forEach(s=>{
      const st=n.st[s.id]||{s:'pending',n:'',d:''};
      const sl=n.sl[s.id]||{u:'',t:''};
      stages.push({novelId:n.id,stageId:s.id,status:st.s,note:st.n,due:st.d,url:sl.u,tool:sl.t});
    });
  });
  const refs=[];
  novels.forEach(n=>{(n.refs||[]).forEach(r=>{refs.push({novelId:n.id,icon:r.i,name:r.n,desc:r.d,url:r.u});});});
  const pubs=[];
  novels.forEach(n=>{(n.pubs||[]).filter(p=>p.name||p.url).forEach(p=>{pubs.push({novelId:n.id,name:p.name,url:p.url});});});
  return{novels:novelsFlat,stages,refs,pubs};
}

let syncStatus='local';
function updateSyncBadge(){
  const el=document.getElementById('sync-badge');
  if(!el)return;
  const labels={local:'로컬',syncing:'동기화중…',synced:'✓ 동기화됨',error:'⚠ 오류'};
  const colors={local:'var(--fg4)',syncing:'var(--active)',synced:'var(--done)',error:'var(--danger)'};
  el.textContent=labels[syncStatus];el.style.color=colors[syncStatus];
}

let isSaving=false;
let hasLocalData=false;

async function loadFromSheets(force){
  if(!SHEETS_ENABLED||isSaving||pendingSave)return;
  if(hasLocalData&&!force)return;
  syncStatus='syncing';updateSyncBadge();
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    if(data.error){syncStatus='error';updateSyncBadge();return;}
    if(data.novels&&data.novels.length>0){
      const localPubs={};
      if(pendingSave){
        N.forEach(n=>{localPubs[n.id]=n.pubs||[];});
      }
      const newN=sheetsToN(data);
      newN.forEach(n=>{
        if(!S.some(s=>s.id===n.cs)){n.cs='ideation';}
      });
      N=newN;
      N.forEach(n=>{
        if(pendingSave){
          const sheetsPubs=n.pubs||[];
          const localPubsForN=localPubs[n.id]||[];
          const merged=[...sheetsPubs];
          localPubsForN.forEach(localPub=>{
            if(!localPub.name||!localPub.url)return;
            const exists=merged.some(p=>p.name===localPub.name&&p.url===localPub.url);
            if(!exists){merged.push(localPub);}
          });
          n.pubs=merged;
        }
        while(n.pubs.length<5)n.pubs.push({name:'',url:''});
      });
      hasLocalData=true;
      R();syncStatus='synced';
    } else if(!hasLocalData){
      await saveToSheets();
      syncStatus='synced';
    } else {
      syncStatus='synced';
    }
  }catch(e){syncStatus='error';}
  updateSyncBadge();
}

async function saveToSheets(){
  if(!SHEETS_ENABLED)return;
  isSaving=true;
  syncStatus='syncing';updateSyncBadge();
  try{
    const payload={action:'save_all',...nToSheets(N)};
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    const result=await res.json();
    if(result.ok){syncStatus='synced';hasLocalData=true;}
    else syncStatus='error';
  }catch(e){syncStatus='error';}
  isSaving=false;
  updateSyncBadge();
}

let saveTimer=null;
let pendingSave=false;
async function persist(){
  hasLocalData=true;
  R();
  if(SHEETS_ENABLED){
    pendingSave=true;
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async ()=>{
      try{
        await saveToSheets();
        pendingSave=false;
        await loadFromSheets(true);
      }catch(e){
        pendingSave=false;
        syncStatus='error';
        updateSyncBadge();
      }
    },800);
  }
}
async function manualSync(){if(!SHEETS_ENABLED){toast('Sheets URL이 설정되지 않았습니다');return;}toast('동기화 중…');await saveToSheets();await loadFromSheets(true);rSet();toast('동기화 완료');}

let cv="overview",at=new Set(),ex=new Set(),dk=true,blinkOn=true,hideDone=false;

let draggedId = null;
let dragType = null;

function drag(e, id, type) {
    draggedId = id;
    dragType = type;
    e.dataTransfer.effectAllowed = "move";
    e.target.style.opacity = "0.5";
}

function allowDrop(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
}

function drop(e, targetId, type) {
    e.preventDefault();
    if (draggedId === targetId || dragType !== type) return;

    const draggedIdx = N.findIndex(x => x.id === draggedId);
    const targetIdx = N.findIndex(x => x.id === targetId);

    const [removed] = N.splice(draggedIdx, 1);
    N.splice(targetIdx, 0, removed);

    e.target.style.opacity = "1";
    persist(); 
    toast("작품 순서가 변경되었습니다.");
}

document.addEventListener("dragend", (e) => {
    if (e.target.classList && (e.target.classList.contains('wk') || e.target.tagName === 'TR')) {
        e.target.style.opacity = "1";
    }
}, false);

function showDet(id){const n=N.find(x=>x.id===id);document.getElementById('main-view').classList.add('hidden');const dv=document.getElementById('det-v');dv.classList.remove('hidden');
  let lk='';if(n.links.gdoc)lk+=`<a href="${n.links.gdoc}" target="_blank" class="d-lk docs">📄 Docs</a>`;if(n.links.gdrive)lk+=`<a href="${n.links.gdrive}" target="_blank" class="d-lk drive">📁 Drive</a>`;if(n.links.nc)lk+=`<a href="${n.links.nc}" target="_blank" class="d-lk nc">✒️ NC</a>`;
  let tl='';S.forEach((st,i)=>{const info=n.st[st.id];const isC=n.cs===st.id;const dc=info.s==='done'?'done':info.s==='blocked'?'blocked':isC?'active':'pending';const dot=info.s==='done'?'✓':info.s==='blocked'?'⊘':isC?st.i:(i+1);const lc=info.s==='done'?'done':'pending';const cc=isC?'as':info.s==='blocked'?'bs':info.s==='pending'?'ps':'';const stxt=info.s==='done'?'DONE':info.s==='active'?'진행중':info.s==='blocked'?'BLOCKED':'대기';const sl=n.sl[st.id];let tlk='';if(sl&&sl.u){const tc=sl.t==='nc'?'nc':'docs';tlk=`<a href="${sl.u}" target="_blank" class="tl-tl ${tc}">${sl.t==='nc'?'NC':'Docs'} →</a>`;}const dueI=info.d?` <span style="font-size:10px;color:var(--fg4);font-family:Sora">📅${info.d}</span>`:'';tl+=`<div class="tl-i"><div class="tl-l"><div class="tl-d ${dc}">${dot}</div>${i<S.length-1?`<div class="tl-ln ${lc}"></div>`:''}</div><div class="tl-b ${cc}"><div class="tl-r"><span class="n">${st.l} ${tlk}${dueI}</span><span class="st ${info.s}">${stxt}</span></div>${info.n?`<div class="tl-note">${info.n}</div>`:''}</div></div>`;});
  let refs=`<div class="ref-s"><h3>📎 참고자료</h3>`;if(!n.refs||!n.refs.length)refs+=`<div class="ref-empty">없음</div>`;else{refs+=`<div class="ref-l">`;n.refs.forEach(r=>{refs+=`<div class="ref-c"><span style="font-size:20px">${r.i}</span><div style="flex:1"><div class="rn">${r.n}</div><div class="rd">${r.d}</div></div><a href="${r.u}" target="_blank">열기</a></div>`;});refs+=`</div>`;}refs+=`</div>`;
  dv.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><button class="back" onclick="hideDet()">← 돌아가기</button><button class="icon-btn" onclick="hideDet();titleDbl(null,${id})" title="편집" style="font-size:14px">✏️</button></div><div class="dt">${n.title}</div><div class="d-tags">${n.tags.map(t=>`<span class="d-tag">${t}</span>`).join('')}</div><div class="d-meta"><span>분량 ${n.len}</span><span>시작 ${n.sd}</span><span>목표 ${n.ed}</span></div><div class="d-links">${lk}</div>${tl}${refs}`;}
function hideDet(){document.getElementById('det-v').classList.add('hidden');document.getElementById('main-view').classList.remove('hidden');}

function tipHtml(n,st,info){const statusLabels={done:'DONE',active:'진행중',pending:'대기',blocked:'BLOCKED'};let h=`<div class="tip-stage">${st.i} ${st.l}</div><div class="tip-status ${info.s}">${statusLabels[info.s]}</div>`;if(info.n)h+=`<div class="tip-memo">${info.n}</div>`;if(info.d){const days=dab(TD,new Date(info.d));const cls=days<0?'over':days<=5?'soon':'';const txt=days<0?`${Math.abs(days)}일 초과`:`${days}일 남음`;h+=`<div class="tip-due ${cls}">📅 ${info.d} (${txt})</div>`;}if(!info.n&&!info.d)h+=`<div class="tip-no">메모 없음</div>`;return h;}

function R(){
  const ns=gf();const ac=N.filter(n=>!["complete","publishing"].includes(n.cs)).length;
  document.getElementById('stats').textContent=`${N.length} projects · ${ac} active`;

  let o=`<div class="glass-panel ov-wrap"><table class="ov-t"><thead><tr><th>작품</th>${S.map(s=>`<th>${s.l}</th>`).join('')}</tr></thead><tbody>`;
  ns.forEach((n, idx)=>{
    let rU='';
    S.forEach(st=>{const info=n.st[st.id];if(info.s==='active'&&info.d){if(uc(info.d)==='uc'||uc(info.d)==='u3')rU='row-over';}});
    const dl=dli(n);
    const oB=dl.st==='overdue'?'<span class="over-badge">OVERDUE</span>':'';
    const hasDir=!!n.dir;
    o+=`<tr class="${rU}" draggable="true" ondragstart="drag(event, ${n.id}, 'row')" ondragover="allowDrop(event)" ondrop="drop(event, ${n.id}, 'row')"><td><span class="ov-nm ${hasDir?'has-link':''}" onclick="handleTitle(event,${n.id})">${idx+1}. ${n.title}</span>${oB}${n.sd?`<div class="ov-start">${n.sd} ~</div>`:''}<div class="ov-sub">${n.tags.map(t=>`<span class="ov-tag">${t}</span>`).join('')}</div></td>`;
    S.forEach(st=>{
      const info=n.st[st.id];
      const sl=n.sl[st.id];
      const tc=sl&&sl.t==='nc'?'nc':sl&&(sl.t==='gdoc'||sl.t==='gdrive')?'docs':'none';
      const isE=!sl?.u&&!info.n;
      let cc='c ';
      if(info.s==='done'){if(st.id==='complete')cc+='d complete-done';else cc+=`d ${tc}${sl&&sl.u?' has-url':''}`;}
      else if(info.s==='active')cc+=`a ${uc(info.d)}`;
      else if(info.s==='blocked')cc+='b';
      else cc+=`p${isE?' empty':''}`;
      let lb='';
      if(st.id==='complete'&&info.s==='done')lb='DONE';
      else if(st.id==='publishing'){
  const pc = (n.pubs||[]).filter(p => p.name && p.url).length;
  if(info.s === 'done'){
    lb = `완료(${pc}곳)`;
  } else if(info.s === 'active'){
    lb = `진행중(${pc}곳)`;
  } else if(pc > 0){
    lb = `${pc}곳`;
  } else {
    lb = '';
  }
}
      else{if(info.s==='active')lb='NOW';else if(info.s==='blocked')lb='BLOCKED';else if(info.s==='done'&&sl&&sl.t)lb=TL[sl.t]||'';}
      const dueTag=info.d?`<span class="c-due">📅${info.d.slice(5)}</span>`:'';
      o+=`<td><div class="${cc}" onclick="handleCell(event,${n.id},'${st.id}')" oncontextmenu="showCtx(event,${n.id},'${st.id}')"><span class="cl">${lb}</span><div class="c-tip">${tipHtml(n,st,info)}</div>${dueTag}</div></td>`;
    });
    o+=`</tr>`;
  });
  o+=`</tbody></table></div>`;

  let mo='<div class="mob-ov">';
  ns.forEach((n, idx)=>{
    const dl=dli(n);
    const cs=S.find(x=>x.id===n.cs)||S;
    const dlTxt=dl.r<0?`${Math.abs(dl.r)}일 초과`:`${dl.r}일 남음`;
    const aD=n.st[n.cs]?.d||'';
    const uCls=uc(aD);
    let btns='';
    if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="mob-btn docs">Docs</a>`;
    if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="mob-btn drive">Drive</a>`;
    if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="mob-btn nc">NC</a>`;
    mo+=`<div class="mob-card ${uCls}" onclick="showDet(${n.id})"><div class="mob-top"><span class="mob-title ${!!n.dir?'has-link':''}" onclick="event.stopPropagation();handleTitle(event,${n.id})">${idx+1}. ${n.title}</span><span class="mob-badge">${cs.i} ${cs.l}</span></div><div class="mob-tags">${n.tags.map(t=>`<span class="mob-tag">${t}</span>`).join('')}</div><div class="mob-bar-wrap"><div class="mob-labels">${S.map(s=>`<div class="mob-label">${s.l}</div>`).join('')}</div><div class="mob-bar">${S.map(st=>{
      const info=n.st[st.id];const sl=n.sl[st.id];const tc=sl&&sl.t==='nc'?'nc':sl&&(sl.t==='gdoc'||sl.t==='gdrive')?'docs':'none';let sc='mob-seg ';if(info.s==='done'){if(st.id==='complete')sc+='d complete-done';else sc+=`d ${tc}`;}else if(info.s==='active')sc+='a';else if(info.s==='blocked')sc+='b';else sc+=`p${!sl?.u&&!info.n?' empty':''}`;const lb=st.id==='complete'&&info.s==='done'?'DONE':info.s==='active'?'NOW':info.s==='blocked'?'BLOCKED':info.s==='done'&&sl&&sl.t?(TL[sl.t]||''):'';
      return `<div class="${sc}" onclick="event.stopPropagation();handleCell(event,${n.id},'${st.id}')" oncontextmenu="showCtx(event,${n.id},'${st.id}')">${lb}</div>`;
    }).join('')}</div></div><div class="mob-info"><div><span class="k">남은 기간</span><div class="v ${dl.st}">${dlTxt}</div></div><div><span class="k">진행</span><div class="v">${gp(n)}%</div></div><div><span class="k">분량</span><div class="v">${n.len}</div></div></div><div class="mob-btns" onclick="event.stopPropagation()">${btns}</div></div>`;
  });
  mo+='</div>';
  document.getElementById('ov-v').innerHTML=o+mo;

  let w=`<div class="sec-title">진행 상세 분석</div><div class="cards-grid">`;
  ns.forEach((n, idx)=>{
    const prog=gp(n);const cs=S.find(x=>x.id===n.cs)||S;const ci=si(n.cs);const dW=Math.round((ci/S.length)*100);const aW=Math.round((1/S.length)*100);const dl=dli(n);const note=n.st[n.cs]?.n||'';const sl=n.sl[n.cs];const tC=sl&&sl.t==='nc'?'t-nc':'t-docs';const aD=n.st[n.cs]?.d||'';
    let btns='';if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="wk-btn docs" onclick="event.stopPropagation()">Docs</a>`;if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="wk-btn drive" onclick="event.stopPropagation()">Drive</a>`;if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="wk-btn nc" onclick="event.stopPropagation()">NC</a>`;
    w+=`<div class="wk ${tC} ${uc(aD)}" draggable="true" ondragstart="drag(event, ${n.id}, 'card')" ondragover="allowDrop(event)" ondrop="drop(event, ${n.id}, 'card')" onclick="showDet(${n.id})"><div class="wk-top"><div class="wk-t ${!!n.dir?'has-link':''}" onclick="event.stopPropagation();handleTitle(event,${n.id})">${idx+1}. ${n.title}</div><div class="wk-bdg">${cs.i} ${cs.l}</div></div><div class="wk-tags">${n.tags.map(t=>`<span class="wk-tag">${t}</span>`).join('')}</div><div class="wk-prog"><div class="wk-prog-bar"><div class="wk-pg-d" style="width:${dW}%"></div><div class="wk-pg-a" style="width:${aW}%"></div></div><div class="wk-prog-info"><span>진척도 ${prog}%</span><span>일정 ${dl.p}%</span></div></div>${note?`<div class="wk-note">${note}</div>`:''}<div class="wk-grid"><div class="wk-gi"><span class="wk-gl">분량</span><span class="wk-gv">${n.len}</span></div><div class="wk-gi"><span class="wk-gl">목표</span><span class="wk-gv">${n.ed}</span></div><div class="wk-gi"><span class="wk-gl">남은 기간</span><span class="wk-gv ${dl.st}">${dl.r}일</span></div>${aD?`<div class="wk-gi"><span class="wk-gl">마감</span><span class="wk-gv">${aD}</span></div>`:''}</div><div class="wk-btns">${btns}</div></div>`;
  });
  w+='</div>';
  document.getElementById('wk-v').innerHTML=w;
}

rp();
loadFromSheets(true);
updateSyncBadge();

let pollingInterval=null;
function startPolling(){
  if(pollingInterval)return;
  pollingInterval=setInterval(async ()=>{
    if(!isSaving && !document.hidden){
      try{ await loadFromSheets(true); }catch(e){}
    }
  },60000);
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden) { clearInterval(pollingInterval); pollingInterval=null; }
  else startPolling();
});
startPolling();
</script>
