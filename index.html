<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📋 Novel Cockpit - 창작 관리 대시보드</title>
    <style>
        /* ===== CSS Variables (다크모드) ===== */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-tertiary: #777777;
            
            /* Theme 1: 그래디언트 (채도 조정) */
            --grad-purple: #5a6fd8;
            --grad-pink: #d85a6f;
            --grad-blue: #2a8fc4;
            
            /* 상태 색상 (고정) */
            --status-done: #4169E1;    /* 完 파란 */
            --status-prog: #FFA500;    /* 中 주황 */
            --status-start: #FFD700;   /* 初 노랑 */
            
            /* 테두리 & 분리선 */
            --border-light: rgba(255, 255, 255, 0.1);
            --border-medium: rgba(255, 255, 255, 0.2);
            
            /* 간격 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        /* ===== 기본 스타일 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            overflow: hidden;
        }

        a {
            color: var(--grad-blue);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--grad-purple);
            border-color: var(--grad-purple);
        }

        button:active {
            transform: scale(0.98);
        }

        input, textarea, select {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
            padding: var(--spacing-sm);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--grad-blue);
            box-shadow: 0 0 8px rgba(42, 143, 196, 0.3);
        }

        /* ===== 컨테이너 레이아웃 ===== */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
            padding: var(--spacing-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .content {
            flex: 1;
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        /* ===== 로딩 표시 ===== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-medium);
            border-top-color: var(--grad-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 알림 메시지 ===== */
        .notification {
            position: fixed;
            top: var(--spacing-md);
            right: var(--spacing-md);
            background-color: var(--bg-tertiary);
            border-left: 4px solid var(--grad-blue);
            color: var(--text-primary);
            padding: var(--spacing-md);
            border-radius: 8px;
            z-index: 9998;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            border-left-color: #10b981;
        }

        .notification.error {
            border-left-color: #ef4444;
        }

        .notification.warning {
            border-left-color: var(--status-prog);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== iPhone 세로 (0~430px) ===== */
        @media (max-width: 430px) {
            .header {
                padding: var(--spacing-md) var(--spacing-sm);
            }

            .header h1 {
                font-size: 16px;
            }

            .header-actions {
                gap: 4px;
            }

            .header-actions button {
                padding: 6px 12px;
                font-size: 12px;
            }

            /* iPhone 세로: 카드 스택 */
            #matrix-view, .matrix-header, .matrix-row {
                display: none !important;
            }

            .card-view {
                display: flex;
                flex-direction: column;
                gap: var(--spacing-md);
                padding: var(--spacing-md);
                overflow-y: auto;
            }

            .card {
                background: linear-gradient(
                    135deg,
                    rgba(90, 111, 216, 0.15),
                    rgba(216, 90, 111, 0.15)
                );
                border: 1px solid var(--border-light);
                border-radius: 16px;
                padding: var(--spacing-md);
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .card:active {
                transform: scale(0.98);
                background: linear-gradient(
                    135deg,
                    rgba(90, 111, 216, 0.25),
                    rgba(216, 90, 111, 0.25)
                );
            }

            .card-title {
                font-size: 18px;
                font-weight: 600;
                margin-bottom: var(--spacing-sm);
            }

            .card-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                margin-bottom: var(--spacing-sm);
            }

            .tag {
                font-size: 11px;
                padding: 4px 8px;
                border-radius: 4px;
                background-color: var(--bg-secondary);
                border: 1px solid var(--border-light);
            }

            .progress-section {
                margin-bottom: var(--spacing-md);
            }

            .progress-label {
                font-size: 13px;
                color: var(--text-secondary);
                margin-bottom: 4px;
            }

            .progress-bar {
                width: 100%;
                height: 6px;
                background-color: var(--bg-secondary);
                border-radius: 3px;
                overflow: hidden;
            }

            .progress-fill {
                height: 100%;
                background: linear-gradient(90deg, var(--grad-purple), var(--grad-pink));
                transition: width 0.3s ease;
            }

            .stages-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stage-badge {
                text-align: center;
                padding: 8px;
                border-radius: 8px;
                background-color: var(--bg-secondary);
                border: 1px solid var(--border-light);
                cursor: pointer;
                transition: all 0.2s ease;
                font-size: 11px;
            }

            .stage-badge[data-status="完"] {
                background-color: rgba(65, 105, 225, 0.2);
                border-color: var(--status-done);
                color: var(--status-done);
            }

            .stage-badge[data-status="中"] {
                background-color: rgba(255, 165, 0, 0.2);
                border-color: var(--status-prog);
                color: var(--status-prog);
            }

            .stage-badge[data-status="初"] {
                background-color: rgba(255, 215, 0, 0.2);
                border-color: var(--status-start);
                color: var(--status-start);
            }

            .stage-badge[data-status=""] {
                background-color: var(--bg-tertiary);
                border-color: var(--border-medium);
                color: var(--text-secondary);
            }
        }

        /* ===== iPad (431px~1024px) ===== */
        @media (min-width: 431px) and (max-width: 1024px) {
            .card-view {
                display: none !important;
            }

            .content {
                flex-direction: row;
            }

            .matrix-container {
                flex: 1;
                overflow: auto;
                border-right: 1px solid var(--border-light);
            }

            .detail-panel {
                width: 40%;
                background-color: var(--bg-secondary);
                border-left: 1px solid var(--border-light);
                overflow-y: auto;
                padding: var(--spacing-md);
            }

            .detail-panel-empty {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100%;
                color: var(--text-secondary);
            }

            .detail-content {
                display: flex;
                flex-direction: column;
                gap: var(--spacing-md);
            }

            .detail-title {
                font-size: 18px;
                font-weight: 600;
                padding-bottom: var(--spacing-sm);
                border-bottom: 1px solid var(--border-light);
            }

            .detail-field {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .detail-label {
                font-size: 12px;
                color: var(--text-secondary);
                font-weight: 500;
            }

            .detail-value {
                font-size: 14px;
                padding: var(--spacing-sm);
                background-color: var(--bg-tertiary);
                border-radius: 6px;
                border: 1px solid var(--border-light);
                cursor: pointer;
            }

            .detail-value:hover {
                background-color: rgba(42, 143, 196, 0.1);
                border-color: var(--grad-blue);
            }

            .detail-actions {
                display: flex;
                gap: var(--spacing-sm);
                margin-top: var(--spacing-md);
                padding-top: var(--spacing-md);
                border-top: 1px solid var(--border-light);
            }

            .detail-actions button {
                flex: 1;
            }
        }

        /* ===== PC (1025px+) ===== */
        @media (min-width: 1025px) {
            .card-view {
                display: none !important;
            }

            .content {
                flex-direction: row;
            }

            .matrix-container {
                flex: 1;
                overflow: auto;
                border-right: 1px solid var(--border-light);
            }

            .detail-panel {
                width: 35%;
                background-color: var(--bg-secondary);
                border-left: 1px solid var(--border-light);
                overflow-y: auto;
                padding: var(--spacing-lg);
            }

            .detail-panel-empty {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100%;
                color: var(--text-secondary);
            }

            .detail-content {
                display: flex;
                flex-direction: column;
                gap: var(--spacing-md);
            }

            .detail-title {
                font-size: 22px;
                font-weight: 600;
                padding-bottom: var(--spacing-md);
                border-bottom: 1px solid var(--border-light);
            }

            .detail-field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .detail-label {
                font-size: 12px;
                color: var(--text-secondary);
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .detail-value {
                font-size: 15px;
                padding: var(--spacing-md);
                background-color: var(--bg-tertiary);
                border-radius: 8px;
                border: 1px solid var(--border-light);
                cursor: pointer;
                word-break: break-all;
            }

            .detail-value:hover {
                background-color: rgba(42, 143, 196, 0.1);
                border-color: var(--grad-blue);
            }

            .detail-actions {
                display: flex;
                gap: var(--spacing-md);
                margin-top: var(--spacing-lg);
                padding-top: var(--spacing-lg);
                border-top: 1px solid var(--border-light);
            }

            .detail-actions button {
                flex: 1;
            }
        }

        /* ===== Matrix 테이블 (iPad 이상) ===== */
        #matrix-view {
            display: none;
        }

        @media (min-width: 431px) {
            #matrix-view {
                display: block;
            }
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .matrix-header {
            position: sticky;
            top: 0;
            background-color: var(--bg-secondary);
            border-bottom: 2px solid var(--border-medium);
            z-index: 10;
        }

        .matrix-header-cell {
            padding: var(--spacing-sm) var(--spacing-xs);
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            border-right: 1px solid var(--border-light);
            white-space: nowrap;
        }

        .matrix-header-cell:first-child {
            border-right: 1px solid var(--border-medium);
            text-align: left;
            padding-left: var(--spacing-md);
            min-width: 120px;
        }

        .matrix-row {
            border-bottom: 1px solid var(--border-light);
            transition: background-color 0.2s ease;
        }

        .matrix-row:hover {
            background-color: rgba(42, 143, 196, 0.05);
            cursor: pointer;
        }

        .matrix-row.selected {
            background-color: rgba(42, 143, 196, 0.15);
        }

        .matrix-title {
            padding: var(--spacing-sm) var(--spacing-md);
            font-weight: 500;
            border-right: 1px solid var(--border-medium);
            min-width: 120px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .matrix-cell {
            padding: var(--spacing-sm) 4px;
            text-align: center;
            border-right: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 50px;
            font-size: 11px;
            font-weight: 500;
        }

        .matrix-cell:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .matrix-cell[data-status="完"] {
            background-color: rgba(65, 105, 225, 0.2);
            color: var(--status-done);
        }

        .matrix-cell[data-status="中"] {
            background-color: rgba(255, 165, 0, 0.2);
            color: var(--status-prog);
        }

        .matrix-cell[data-status="初"] {
            background-color: rgba(255, 215, 0, 0.15);
            color: var(--status-start);
        }

        .matrix-cell[data-status=""] {
            background-color: transparent;
            color: var(--text-tertiary);
        }

        /* ===== 모달 (CRUD) ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9997;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-md);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: var(--spacing-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            padding: var(--spacing-sm);
            border-radius: 6px;
        }

        .modal-footer {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
        }

        .modal-footer button {
            min-width: 100px;
        }

        /* ===== 유틸리티 ===== */
        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-center {
            text-align: center;
        }

        /* ===== 스크롤바 커스터마이징 ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--border-medium);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <h1>📋 Novel Cockpit</h1>
            <div class="header-actions">
                <button id="btn-new-novel">+ 새 작품</button>
                <button id="btn-refresh">🔄 새로고침</button>
            </div>
        </div>

        <!-- 메인 컨텐츠 -->
        <div class="content">
            <!-- iPhone 카드 뷰 -->
            <div class="card-view" id="card-view"></div>

            <!-- iPad/PC Matrix 뷰 -->
            <div class="matrix-container" id="matrix-container">
                <table class="matrix-table" id="matrix-view">
                    <thead class="matrix-header"></thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>

            <!-- iPad/PC 우측 상세 패널 -->
            <div class="detail-panel" id="detail-panel">
                <div class="detail-panel-empty">작품을 선택해주세요</div>
                <div class="detail-content hidden" id="detail-content"></div>
            </div>
        </div>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- 알림 컨테이너 -->
    <div id="notifications"></div>

    <!-- 모달: 새 작품 추가 -->
    <div class="modal" id="modal-new-novel">
        <div class="modal-content">
            <div class="modal-header">
                <span>새 작품 추가</span>
                <button class="modal-close" onclick="closeModal('modal-new-novel')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">작품명 *</label>
                    <input type="text" class="form-input" id="form-title" placeholder="예: 5억년 버튼">
                </div>
                <div class="form-group">
                    <label class="form-label">태그</label>
                    <select class="form-input" id="form-tags" multiple style="height: auto;">

                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">시작일</label>
                    <input type="date" class="form-input" id="form-start-date">
                </div>
                <div class="form-group">
                    <label class="form-label">마감일</label>
                    <input type="date" class="form-input" id="form-due-date">
                </div>
                <div class="form-group">
                    <label class="form-label">예상 길이</label>
                    <input type="text" class="form-input" id="form-length" placeholder="예: 40만">
                </div>
                <div class="form-group">
                    <label class="form-label">메모</label>
                    <textarea class="form-input" id="form-note" placeholder="메모"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('modal-new-novel')">취소</button>
                <button onclick="submitNewNovel()" style="background-color: var(--grad-blue);">저장</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>

        const APPS_SCRIPT_URL = 'AKfycbzhCNenxNCkevAPbMpweDfiuVvbi7KyRblbZOnchf6OIw9-xvN7-i6OTQnQFw0ulB4X'; // 나중에 수정

        // ===== 메모리 변수 =====

                { id: 3, title: '찔러보기', tags: ['문학', '중편', '에로'], currentStage: 4, progress: 44, startDate: '2026-02-01', dueDate: '2026-05-15', length: '80만', note: '' },
                { id: 4, title: '역전의 남자들', tags: ['문학', '장편'], currentStage: 2, progress: 22, startDate: '2026-02-15', dueDate: '2026-07-15', length: '200만', note: '' },
                { id: 5, title: '백지와 거울', tags: ['SF', '장편'], currentStage: 3, progress: 33, startDate: '2026-01-01', dueDate: '2026-08-01', length: '150만', note: '' },

                { novelId: 1, stageId: 7, title: '5억년 버튼', stageName: '퇴고', status: '中', note: '2차 퇴고중', dueDate: '2026-04-10', url: '', tool: 'nc' },
                { novelId: 2, stageId: 1, title: '모르는척', stageName: '착상', status: '完', note: 'K/M 버팀', dueDate: '2026-01-15', url: '', tool: 'gdoc' },
                { novelId: 2, stageId: 7, title: '모르는척', stageName: '퇴고', status: '中', note: '마지막 퇴고', dueDate: '2026-04-10', url: '', tool: 'nc' },
                { novelId: 3, stageId: 4, title: '찔러보기', stageName: '씬구조', status: '中', note: '', dueDate: '2026-04-30', url: '', tool: 'gdoc' },
                { novelId: 4, stageId: 2, title: '역전의 남자들', stageName: '구조설계', status: '中', note: '', dueDate: '2026-05-15', url: '', tool: 'gdoc' },
                { novelId: 5, stageId: 3, title: '백지와 거울', stageName: 'BG', status: '中', note: '', dueDate: '2026-05-01', url: '', tool: 'gdoc' },
                { novelId: 6, stageId: 6, title: '반찬가게', stageName: '초고', status: '中', note: '1차 완성', dueDate: '2026-04-15', url: '', tool: 'gdoc' }
            ];

            stagesData = [
                { id: 1, name: '착상', order: 1, icon: '💭' },
                { id: 2, name: '구조설계', order: 2, icon: '📐' },
                { id: 3, name: 'BG', order: 3, icon: '🌍' },
                { id: 4, name: '씬구조', order: 4, icon: '🎬' },
                { id: 5, name: '씬비트', order: 5, icon: '📝' },
                { id: 6, name: '초고', order: 6, icon: '✍️' },
                { id: 7, name: '퇴고', order: 7, icon: '✏️' },
                { id: 8, name: '교정교열', order: 8, icon: '🔍' },
                { id: 9, name: '발행', order: 9, icon: '📖' }
            ];

            statusData = [
                { status: '完', color: '#4169E1' },
                { status: '中', color: '#FFA500' },
                { status: '初', color: '#FFD700' },
                { status: '', color: '#FFFFFF' }
            ];

            tagsData = [
                { id: 1, name: 'SF', color: '#7c8aff' },
                { id: 2, name: '문학', color: '#2dd4a8' },
                { id: 3, name: '엽편', color: '#fb923c' },
                { id: 4, name: '단편', color: '#06b6d4' },

                { id: 9, name: '판타지', color: '#a78bfa' },

        // ===== Google Sheets에서 데이터 로드 (나중에 활성화) =====
        async function loadDataFromSheets() {
            try {
                showLoading(true);

                const response = await fetch(APPS_SCRIPT_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const json = await response.json();
                novelData = json.novels || [];
                novelstagesData = json.novelstages || [];
                stagesData = json.stages || [];
                statusData = json.statuses || [];
                tagsData = json.tags || [];

                showNotification('데이터 로드 완료', 'success');
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                showNotification('데이터 로드 실패. 더미 데이터 사용.', 'warning');
                loadDummyData();
            } finally {
                showLoading(false);
            }
        }

        // ===== 초기화 =====
        async function init() {
            loadDummyData(); // 테스트 모드: 더미 데이터 로드
            // await loadDataFromSheets(); // 프로덕션: Google Sheets 로드
            
            renderUI();
            setupEventListeners();
        }

        // ===== UI 렌더링 =====
        function renderUI() {
            const isMobile = window.innerWidth <= 430;

            if (isMobile) {
                renderCardView();
            } else {
                renderMatrix();
                renderDetailPanel();
            }
        }

        // ===== iPhone 카드 뷰 렌더링 =====
        function renderCardView() {
            const cardView = document.getElementById('card-view');
            cardView.innerHTML = '';

            novelData.forEach(novel => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => selectNovel(novel.id);

                const stages = novelstagesData.filter(ns => ns.novelId === novel.id);
                const tagsHtml = (novel.tags || []).map(tagName => {
                    const tag = tagsData.find(t => t.name === tagName);
                    return `<div class="tag" style="background-color: ${tag?.color || '#2a2a2a'}22;">${tagName}</div>`;
                }).join('');

                card.innerHTML = `
                    <div class="card-title">${novel.title}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    <div class="progress-section">
                        <div class="progress-label">진행도 ${novel.progress}%</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${novel.progress}%"></div>
                        </div>
                    </div>
                    <div class="stages-grid">
                        ${stagesData.map(stage => {
                            const ns = stages.find(s => s.stageId === stage.id);
                            const status = ns?.status || '';
                            return `
                                <div class="stage-badge" data-status="${status}" title="${stage.name}">
                                    <div style="font-size: 16px;">${stage.icon}</div>
                                    <div style="font-size: 10px; margin-top: 2px;">${stage.name}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

                cardView.appendChild(card);
            });
        }

        // ===== Matrix 렌더링 (iPad/PC) =====
        function renderMatrix() {
            const header = document.querySelector('.matrix-header');
            const tbody = document.getElementById('matrix-body');

            // 헤더 렌더링
            header.innerHTML = `
                <tr>
                    <th class="matrix-header-cell">작품</th>
                    ${stagesData.map(stage => `
                        <th class="matrix-header-cell">${stage.icon}<br>${stage.name}</th>
                    `).join('')}
                </tr>
            `;

            // 행 렌더링
            tbody.innerHTML = novelData.map(novel => {
                const cells = stagesData.map(stage => {
                    const ns = novelstagesData.find(s => s.novelId === novel.id && s.stageId === stage.id);
                    const status = ns?.status || '';
                    return `
                        <td class="matrix-cell" data-status="${status}" 
                            onclick="selectNovel(${novel.id}); updateStatus(${novel.id}, ${stage.id}, event)"
                            title="${ns?.note || ''}">
                            ${status}
                        </td>
                    `;
                }).join('');

                return `
                    <tr class="matrix-row" data-novel-id="${novel.id}" onclick="selectNovel(${novel.id})">
                        <td class="matrix-title">${novel.title}</td>
                        ${cells}
                    </tr>
                `;
            }).join('');
        }

        // ===== 상세 패널 렌더링 (iPad/PC) =====
        function renderDetailPanel() {
            const panel = document.getElementById('detail-panel');
            const detailContent = document.getElementById('detail-content');

            if (!selectedNovelId) {
                panel.innerHTML = '<div class="detail-panel-empty">작품을 선택해주세요</div>';
                return;
            }

            const novel = novelData.find(n => n.id === selectedNovelId);
            if (!novel) return;

            const stages = novelstagesData.filter(ns => ns.novelId === selectedNovelId);
            const tagsHtml = (novel.tags || []).map(tagName => `<span class="tag">${tagName}</span>`).join('');

            detailContent.innerHTML = `
                <div class="detail-title">${novel.title}</div>

                <div class="detail-field">
                    <label class="detail-label">태그</label>
                    <div class="detail-value">${tagsHtml || '없음'}</div>
                </div>

                <div class="detail-field">
                    <label class="detail-label">진행도</label>
                    <div class="detail-value">${novel.progress}%</div>
                </div>

                <div class="detail-field">
                    <label class="detail-label">시작일</label>
                    <div class="detail-value">${novel.startDate || '미정'}</div>
                </div>

                <div class="detail-field">
                    <label class="detail-label">마감일</label>
                    <div class="detail-value" onclick="editField('dueDate', ${novel.id})">${novel.dueDate || '미정'}</div>
                </div>

                <div class="detail-field">
                    <label class="detail-label">예상 길이</label>
                    <div class="detail-value">${novel.length || '미정'}</div>
                </div>

                <div class="detail-field">
                    <label class="detail-label">메모</label>
                    <div class="detail-value" onclick="editField('note', ${novel.id})">${novel.note || '메모 없음'}</div>
                </div>

                <div class="detail-field">
                    <label class="detail-label">단계별 상태</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        ${stagesData.map(stage => {
                            const ns = stages.find(s => s.stageId === stage.id);
                            const status = ns?.status || '';
                            return `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background-color: var(--bg-tertiary); border-radius: 6px;">
                                    <span>${stage.icon} ${stage.name}</span>
                                    <span style="
                                        padding: 4px 8px;
                                        border-radius: 4px;
                                        font-weight: 600;
                                        ${status === '完' ? 'color: var(--status-done); background-color: rgba(65, 105, 225, 0.2);' : ''}
                                        ${status === '中' ? 'color: var(--status-prog); background-color: rgba(255, 165, 0, 0.2);' : ''}
                                        ${status === '初' ? 'color: var(--status-start); background-color: rgba(255, 215, 0, 0.2);' : ''}
                                        ${status === '' ? 'color: var(--text-tertiary);' : ''}
                                    ">${status || '-'}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="detail-actions">
                    <button onclick="editNovel(${novel.id})">수정</button>
                    <button onclick="deleteNovel(${novel.id})" style="background-color: rgba(239, 68, 68, 0.2); color: #ef4444;">삭제</button>
                </div>
            `;

            detailContent.classList.remove('hidden');
            panel.innerHTML = '';
            panel.appendChild(detailContent);
        }

        // ===== 작품 선택 =====
        function selectNovel(novelId) {
            selectedNovelId = novelId;

            // 모바일이 아니면 상세 패널 업데이트
            if (window.innerWidth > 430) {
                document.querySelectorAll('.matrix-row').forEach(row => {
                    row.classList.toggle('selected', row.dataset.novelId == novelId);
                });
                renderDetailPanel();
            }
        }

        // ===== 상태 변경 =====
        async function updateStatus(novelId, stageId, event) {
            event.stopPropagation();

            const currentStatus = novelstagesData.find(ns => ns.novelId === novelId && ns.stageId === stageId)?.status || '';
            const statusOptions = ['', '初', '中', '完'];
            const nextIndex = (statusOptions.indexOf(currentStatus) + 1) % statusOptions.length;
            const newStatus = statusOptions[nextIndex];

            try {
                // 메모리 업데이트
                const ns = novelstagesData.find(n => n.novelId === novelId && n.stageId === stageId);
                if (ns) {
                    ns.status = newStatus;
                }

                // UI 업데이트
                renderUI();
                showNotification('상태가 변경되었습니다', 'success');

                // TODO: Apps Script로 저장
                // await updateCellOnSheets(novelId, stageId, 'E', newStatus);
            } catch (error) {
                showNotification('상태 변경 실패', 'error');
            }
        }

        // ===== 새 작품 추가 =====
        function openNewNovelModal() {
            document.getElementById('modal-new-novel').classList.add('active');

            // 태그 선택지 로드
            const tagSelect = document.getElementById('form-tags');
            tagSelect.innerHTML = tagsData.map(tag => 
                `<option value="${tag.name}">${tag.name}</option>`
            ).join('');
        }

        async function submitNewNovel() {
            const title = document.getElementById('form-title').value;
            const tagElements = Array.from(document.getElementById('form-tags').selectedOptions);
            const tags = tagElements.map(opt => opt.value);
            const startDate = document.getElementById('form-start-date').value;
            const dueDate = document.getElementById('form-due-date').value;
            const length = document.getElementById('form-length').value;
            const note = document.getElementById('form-note').value;

            if (!title) {
                showNotification('작품명을 입력해주세요', 'warning');
                return;
            }

            try {
                showLoading(true);

                // 메모리 업데이트 (새 작품 ID)
                const newId = Math.max(...novelData.map(n => n.id), 0) + 1;
                const progress = 0;

                novelData.push({
                    id: newId,
                    title,
                    tags,
                    currentStage: 1,
                    progress,
                    startDate,
                    dueDate,
                    length,
                    note
                });

                // TODO: Apps Script로 저장
                // await insertNovelOnSheets({ title, tags, startDate, dueDate, length, note });

                closeModal('modal-new-novel');
                renderUI();
                showNotification('새 작품이 추가되었습니다', 'success');
            } catch (error) {
                showNotification('작품 추가 실패: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== 작품 삭제 =====
        async function deleteNovel(novelId) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                showLoading(true);

                // 메모리에서 삭제
                novelData = novelData.filter(n => n.id !== novelId);
                novelstagesData = novelstagesData.filter(ns => ns.novelId !== novelId);

                selectedNovelId = null;

                // TODO: Apps Script로 삭제
                // await deleteNovelOnSheets(novelId);

                renderUI();
                showNotification('작품이 삭제되었습니다', 'success');
            } catch (error) {
                showNotification('삭제 실패: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // ===== 필드 수정 =====
        function editField(fieldName, novelId) {
            const novel = novelData.find(n => n.id === novelId);
            if (!novel) return;

            const currentValue = novel[fieldName] || '';
            const newValue = prompt(`${fieldName} 수정:`, currentValue);

            if (newValue !== null && newValue !== currentValue) {
                novel[fieldName] = newValue;
                renderDetailPanel();
                showNotification('수정되었습니다', 'success');

                // TODO: Apps Script로 저장
                // await updateCellOnSheets(novelId, null, getColumnLetter(fieldName), newValue);
            }
        }

        // ===== 모달 제어 =====
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.getElementById('form-title').value = '';
            document.getElementById('form-start-date').value = '';
            document.getElementById('form-due-date').value = '';
            document.getElementById('form-length').value = '';
            document.getElementById('form-note').value = '';
        }

        // ===== 로딩 표시 =====
        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('active', show);
        }

        // ===== 알림 표시 =====
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notifications');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;

            container.appendChild(notif);

            setTimeout(() => {
                notif.remove();
            }, 3000);
        }

        // ===== 이벤트 리스너 설정 =====
        function setupEventListeners() {
            document.getElementById('btn-new-novel').addEventListener('click', openNewNovelModal);
            document.getElementById('btn-refresh').addEventListener('click', init);

            // 화면 회전 감지
            window.addEventListener('orientationchange', () => {
                setTimeout(renderUI, 100);
            });

            // 창 크기 변경 감지
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(renderUI, 300);
            });

            // 모달 닫기 (ESC)
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal('modal-new-novel');
                }
            });
        }

        // ===== 페이지 로드 시 실행 =====
        window.addEventListener('load', init);
    </script>
