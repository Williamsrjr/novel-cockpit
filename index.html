<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Novel Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#060911;--bg1:#0d1117;--bg2:#161b26;--bg3:#1c2333;--bg4:#262f40;
  --fg:#e8ecf4;--fg2:#b8c0d0;--fg3:#7a8494;--fg4:#4a5568;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --glass:rgba(22,27,38,.75);
  --accent:#22d3ee;--accent-bg:rgba(34,211,238,.1);
  --docs:#34d399;--docs-bg:rgba(52,211,153,.12);--docs-bd:rgba(52,211,153,.25);
  --nc:#818cf8;--nc-bg:rgba(129,140,248,.12);--nc-bd:rgba(129,140,248,.25);
  --done:#10b981;--done-bg:rgba(16,185,129,.15);
  --active:#f59e0b;--active-bg:rgba(245,158,11,.12);--active-bd:rgba(245,158,11,.3);
  --warn:#fb923c;--danger:#fb7185;--danger-bg:rgba(251,113,133,.08);
  --blocked:#e879f9;--blocked-bg:rgba(232,121,249,.12);--blocked-bd:rgba(232,121,249,.3);
  --green:#10b981;--yellow:#fbbf24;--red:#f87171;
}
[data-theme="light"]{
  --bg0:#f5f7fa;--bg1:#ffffff;--bg2:#f0f2f5;--bg3:#e8ecf0;--bg4:#d1d5db;
  --fg:#111827;--fg2:#374151;--fg3:#6b7280;--fg4:#9ca3af;
  --border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
  --glass:rgba(255,255,255,.85);
  --docs:#059669;--docs-bg:rgba(5,150,105,.08);--docs-bd:rgba(5,150,105,.2);
  --nc:#6366f1;--nc-bg:rgba(99,102,241,.08);--nc-bd:rgba(99,102,241,.2);
  --done:#059669;--done-bg:rgba(5,150,105,.1);
  --active:#d97706;--active-bg:rgba(217,119,6,.08);--active-bd:rgba(217,119,6,.25);
  --blocked:#a855f7;--blocked-bg:rgba(168,85,247,.08);--blocked-bd:rgba(168,85,247,.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg0);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(34,211,238,.04),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(129,140,248,.03),transparent 60%);pointer-events:none;z-index:0;}
.app{max-width:1120px;margin:0 auto;padding:20px;position:relative;z-index:1;}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--nc));display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-size:18px;font-weight:900;color:#fff;}
.brand h1{font-family:'Outfit';font-size:22px;font-weight:700;letter-spacing:-.5px;}
.brand h1 span{color:var(--fg4);font-weight:400;font-size:18px;}
.brand-sub{font-family:'Outfit';font-size:11px;color:var(--fg4);margin-top:1px;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--glass);color:var(--fg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
.hdr-btn:hover{background:var(--bg3);color:var(--fg);transform:translateY(-1px);}

/* Nav */
.nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.nav-tabs{display:flex;background:var(--bg2);border-radius:11px;padding:3px;border:1px solid var(--border);}
.nav-t{padding:7px 16px;border:none;background:transparent;color:var(--fg3);cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s;}
.nav-t.on{background:var(--bg4);color:var(--fg);box-shadow:0 2px 8px rgba(0,0,0,.2);}
.nav-sep{width:1px;height:22px;background:var(--border2);margin:0 6px;}
.pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{padding:4px 11px;border:1px solid var(--border2);background:transparent;color:var(--fg3);cursor:pointer;border-radius:100px;font-size:11px;font-family:inherit;transition:all .15s;white-space:nowrap;font-weight:500;}
.pill.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:600;}

/* Legend */
.legend{display:flex;gap:14px;margin-bottom:14px;font-size:10px;color:var(--fg4);align-items:center;flex-wrap:wrap;font-family:'Outfit';font-weight:500;}
.lg-i{display:flex;align-items:center;gap:4px;}
.lg-d{width:12px;height:6px;border-radius:2px;}
.lg-hint{margin-left:auto;opacity:.7;}

/* ===== CONTEXT MENU ===== */
.ctx{position:fixed;z-index:300;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:6px;min-width:200px;box-shadow:0 16px 48px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04);backdrop-filter:blur(20px);animation:ctx-in .15s ease;}
@keyframes ctx-in{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-title{font-family:'Outfit';font-size:10px;color:var(--fg4);font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:6px 10px 4px;user-select:none;}
.ctx-sep{height:1px;background:var(--border);margin:4px 6px;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--fg2);transition:all .1s;user-select:none;}
.ctx-item:hover{background:var(--bg4);color:var(--fg);}
.ctx-item .ci-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.ctx-item .ci-label{flex:1;}
.ctx-item .ci-key{font-family:'Outfit';font-size:9px;color:var(--fg4);font-weight:600;padding:2px 6px;background:var(--bg3);border-radius:4px;}
.ctx-item.active-item{color:var(--active);}
.ctx-item.done-item{color:var(--done);}
.ctx-item.blocked-item{color:var(--blocked);}
.ctx-item.danger-item{color:var(--danger);}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:200;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:201;width:90%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:28px;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.modal h3{font-family:'Outfit';font-size:17px;font-weight:700;margin-bottom:4px;}
.modal .sub{font-size:12px;color:var(--fg3);margin-bottom:18px;}
.modal label{display:block;font-size:11px;color:var(--fg4);font-weight:600;font-family:'Outfit';text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-top:14px;}
.modal label:first-of-type{margin-top:0;}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--fg);font-size:13px;font-family:inherit;}
.modal textarea{resize:vertical;min-height:60px;line-height:1.5;}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent);}
.m-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.m-btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;}
.m-cancel{background:var(--bg4);color:var(--fg3);}
.m-ok{background:var(--accent);color:#000;}
.m-ok:hover{filter:brightness(1.1);}
.m-danger{background:var(--danger);color:#fff;font-size:12px;padding:8px 14px;}
.m-danger:hover{filter:brightness(1.1);}
.m-tags-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.m-tag-cb{display:none;}
.m-tag-label{padding:5px 12px;border-radius:100px;border:1px solid var(--border2);color:var(--fg3);font-size:12px;cursor:pointer;transition:all .15s;font-weight:500;user-select:none;}
.m-tag-cb:checked+.m-tag-label{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:600;}

/* ===== OVERVIEW TABLE ===== */
.ov-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px;border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(16px);}
.ov-t{width:100%;min-width:860px;border-collapse:collapse;}
.ov-t thead th{font-family:'Outfit';font-size:9px;color:var(--fg4);font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:14px 3px 10px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2;}
.ov-t thead th:first-child{text-align:left;padding-left:18px;min-width:155px;width:155px;}
.ov-t thead th .si{display:block;font-size:13px;margin-bottom:2px;}
.ov-t tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
.ov-t tbody tr:hover{background:rgba(34,211,238,.03);}
.ov-t tbody tr:last-child{border-bottom:none;}
.ov-t td{padding:9px 3px;text-align:center;vertical-align:middle;}
.ov-t td:first-child{text-align:left;padding-left:18px;}
.ov-nm{font-size:13px;font-weight:700;color:var(--fg);cursor:pointer;transition:color .15s;display:inline-block;border-bottom:1px dashed var(--fg4);text-decoration:none;}
.ov-nm:hover{color:var(--accent);}
.ov-nm.has-link{border-bottom-color:var(--docs);}
.ov-sub{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.ov-tag{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:var(--fg3);font-weight:500;}
.ov-start{font-size:9px;color:var(--fg4);margin-top:2px;font-family:'Outfit';}

/* Cells */
.c{display:inline-flex;align-items:center;justify-content:center;width:82%;height:26px;border-radius:6px;cursor:pointer;position:relative;transition:all .2s;user-select:none;-webkit-user-select:none;font-family:'Outfit';}
.c:hover{transform:scale(1.12);}
.c.d.docs{background:var(--docs-bg);border:1px solid var(--docs-bd);}
.c.d.nc{background:var(--nc-bg);border:1px solid var(--nc-bd);}
.c.d.none{background:var(--done-bg);border:1px solid rgba(16,185,129,.2);}
.c.a{background:var(--active-bg);border:1px solid var(--active-bd);box-shadow:0 0 12px rgba(245,158,11,.15);}
.c.p{background:var(--bg3);border:1px solid var(--border);opacity:.35;}
.c.p:hover{opacity:.55;}
.c.b{background:var(--blocked-bg);border:1px solid var(--blocked-bd);opacity:.85;}
.c.has-url{border-bottom-width:2px;}
.cl{font-size:7px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.c.d .cl{color:var(--docs);}
.c.d.nc .cl{color:var(--nc);}
.c.a .cl{color:var(--active);}
.c.p .cl{color:var(--fg4);}
.c.b .cl{color:var(--blocked);}

/* Enhanced Tooltip */
.c-tip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--bg1);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:11px;color:var(--fg);z-index:20;pointer-events:none;box-shadow:0 12px 32px rgba(0,0,0,.4);min-width:140px;max-width:220px;white-space:normal;line-height:1.5;}
.c-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--border2);}
.c:hover .c-tip{display:block;}
.tip-stage{font-family:'Outfit';font-weight:700;font-size:12px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.tip-memo{color:var(--fg2);font-size:11px;margin-bottom:6px;border-left:2px solid var(--active);padding-left:8px;}
.tip-due{font-family:'Outfit';font-size:10px;color:var(--fg3);display:flex;align-items:center;gap:4px;}
.tip-due.soon{color:var(--warn);}
.tip-due.over{color:var(--danger);font-weight:600;}
.tip-status{font-family:'Outfit';font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.tip-status.done{color:var(--done);}
.tip-status.active{color:var(--active);}
.tip-status.pending{color:var(--fg4);}
.tip-status.blocked{color:var(--blocked);}
.tip-no{color:var(--fg4);font-style:italic;}

.c-due{position:absolute;top:-7px;right:-8px;font-size:7px;background:var(--bg4);color:var(--fg3);padding:1px 4px;border-radius:3px;font-weight:600;white-space:nowrap;}

/* Urgency */
@keyframes bl1{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes bl2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bl3{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blc{0%,100%{box-shadow:0 0 0 rgba(251,113,133,0)}50%{box-shadow:0 0 14px rgba(251,113,133,.4)}}
.u1{animation:bl1 3s ease-in-out infinite;}
.u2{animation:bl2 1.5s ease-in-out infinite;}
.u3{animation:bl3 .8s ease-in-out infinite;}
.uc{animation:bl3 .4s ease-in-out infinite,blc .4s ease-in-out infinite;border-color:var(--danger)!important;}
.row-over{background:var(--danger-bg)!important;}
.over-badge{font-family:'Outfit';font-size:8px;color:var(--danger);font-weight:800;margin-left:5px;text-transform:uppercase;}

/* ===== MOBILE OVERVIEW ===== */
.mob-ov{display:none;}
.mob-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;transition:all .2s;}
.mob-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mob-title{font-size:15px;font-weight:700;color:var(--fg);cursor:pointer;border-bottom:1px dashed var(--fg4);}
.mob-title.has-link{border-bottom-color:var(--docs);}
.mob-badge{font-family:'Outfit';font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--active-bg);color:var(--yellow);border:1px solid var(--active-bd);}
.mob-tags{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap;}
.mob-tag{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--fg3);}
.mob-bar{display:flex;gap:2px;margin-bottom:8px;}
.mob-seg{flex:1;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:6px;font-weight:700;font-family:'Outfit';text-transform:uppercase;position:relative;transition:all .15s;}
.mob-seg:active{transform:scale(1.15);}
.mob-seg.d.docs{background:var(--docs-bg);border:1px solid var(--docs-bd);color:var(--docs);}
.mob-seg.d.nc{background:var(--nc-bg);border:1px solid var(--nc-bd);color:var(--nc);}
.mob-seg.d.none{background:var(--done-bg);border:1px solid rgba(16,185,129,.2);color:var(--done);}
.mob-seg.a{background:var(--active-bg);border:1px solid var(--active-bd);color:var(--active);}
.mob-seg.p{background:var(--bg3);border:1px solid var(--border);color:var(--fg4);opacity:.35;}
.mob-seg.b{background:var(--blocked-bg);border:1px solid var(--blocked-bd);color:var(--blocked);}
.mob-info{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:11px;margin-bottom:10px;}
.mob-info .k{color:var(--fg4);font-family:'Outfit';font-size:9px;font-weight:600;text-transform:uppercase;}
.mob-info .v{color:var(--fg2);font-weight:500;}
.mob-info .v.warn{color:var(--warn);}
.mob-info .v.overdue{color:var(--danger);}
.mob-info .v.ok{color:var(--green);}
.mob-btns{display:flex;gap:5px;flex-wrap:wrap;}
.mob-btn{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;color:#fff;text-decoration:none;font-family:'Outfit';}
.mob-btn.docs{background:var(--docs);}
.mob-btn.drive{background:#0ea5e9;}
.mob-btn.nc{background:var(--nc);}
.mob-btn.ref{background:var(--bg4);color:var(--fg3);}

/* ===== WORKS CARDS ===== */
.cards-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
.wk{background:var(--glass);backdrop-filter:blur(16px);border-radius:16px;padding:22px;border:1px solid var(--border);transition:all .25s;cursor:pointer;position:relative;overflow:hidden;}
.wk:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.2);}
.wk::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.wk.t-docs::before{background:linear-gradient(90deg,var(--docs),transparent);}
.wk.t-nc::before{background:linear-gradient(90deg,var(--nc),transparent);}
.wk-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.wk-t{font-family:'Outfit';font-size:18px;font-weight:700;letter-spacing:-.3px;cursor:pointer;border-bottom:1px dashed var(--fg4);}
.wk-t.has-link{border-bottom-color:var(--docs);}
.wk-bdg{font-family:'Outfit';display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap;background:var(--active-bg);color:var(--yellow);border:1px solid var(--active-bd);}
.wk-tags{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.wk-tag{font-size:10px;padding:2px 8px;border-radius:100px;background:var(--bg3);color:var(--fg3);font-weight:500;}
.wk-prog{margin-bottom:12px;}
.wk-prog-bar{height:5px;background:var(--bg3);border-radius:8px;overflow:hidden;display:flex;}
.wk-pg-d{height:100%;background:var(--done);}
.wk-pg-a{height:100%;background:var(--active);}
.wk-prog-info{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--fg3);font-family:'Outfit';font-weight:500;}
.wk-note{font-size:12px;color:var(--fg2);line-height:1.6;padding:10px 14px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--active);margin-bottom:12px;}
.wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin-bottom:12px;}
.wk-gi{display:flex;flex-direction:column;gap:1px;}
.wk-gl{font-family:'Outfit';font-size:9px;color:var(--fg4);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.wk-gv{font-size:13px;color:var(--fg2);font-weight:500;}
.wk-gv.ok{color:var(--green);}
.wk-gv.warn{color:var(--warn);}
.wk-gv.overdue{color:var(--danger);}
.dl-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:4px 0 12px;}
.dl-fill{height:100%;border-radius:2px;}
.wk-btns{display:flex;gap:6px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);}
.wk-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;color:#fff;text-decoration:none;transition:all .15s;font-family:'Outfit';}
.wk-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.wk-btn.docs{background:var(--docs);}
.wk-btn.drive{background:#0ea5e9;}
.wk-btn.nc{background:var(--nc);}
.wk-btn.ref{background:var(--bg4);color:var(--fg3);}

/* Mobile works */
.mob-works{display:none;}

/* Detail */
.back{background:none;border:none;color:var(--accent);cursor:pointer;padding:4px 0;font-size:13px;font-weight:600;font-family:'Outfit';margin-bottom:14px;}
.back:hover{text-decoration:underline;}
.dt{font-family:'Outfit';font-size:28px;font-weight:800;letter-spacing:-.5px;}
.d-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.d-tag{font-size:12px;padding:4px 12px;border-radius:100px;background:var(--bg3);color:var(--fg2);border:1px solid var(--border2);}
.d-meta{display:flex;gap:18px;margin-top:10px;font-size:13px;color:var(--fg3);flex-wrap:wrap;font-family:'Outfit';}
.d-links{display:flex;gap:8px;margin:18px 0 24px;flex-wrap:wrap;}
.d-lk{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:10px;color:#fff;text-decoration:none;font-size:13px;font-weight:600;font-family:'Outfit';transition:all .2s;}
.d-lk:hover{filter:brightness(1.1);transform:translateY(-1px);}
.d-lk.docs{background:var(--docs);}
.d-lk.drive{background:#0ea5e9;}
.d-lk.nc{background:var(--nc);}
.tl-i{display:flex;gap:14px;min-height:58px;}
.tl-l{display:flex;flex-direction:column;align-items:center;width:34px;flex-shrink:0;}
.tl-d{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.tl-d.done{background:var(--done);}
.tl-d.active{background:var(--active);box-shadow:0 0 0 4px var(--active-bg);}
.tl-d.pending{background:var(--bg4);}

function tipHtml(n,st,info){
  const sl=n.sl[st.id];

  if(info.n)h+=`<div class="tip-memo">${info.n}</div>`;
  if(info.d){
    const days=dab(TD,new Date(info.d));
    const cls=days<0?'over':days<=5?'soon':'';

  return h;
}

  ns.forEach(n=>{
    const prog=gp(n);const cs=S.find(x=>x.id===n.cs);const ci=si(n.cs);const dW=Math.round((ci/S.length)*100);const aW=Math.round((1/S.length)*100);const note=n.st[n.cs]?.n||'';const dl=dli(n);const dlC=dl.st==='overdue'?'var(--danger)':dl.st==='warn'?'var(--warn)':'var(--green)';const dlT=dl.r<0?`${Math.abs(dl.r)}일 초과`:`${dl.r}일 남음`;const rC=n.refs?n.refs.length:0;const sl=n.sl[n.cs];const tC=sl&&sl.t==='nc'?'t-nc':'t-docs';const aD=n.st[n.cs]?.d||'';const uCls=uc(aD);const hasDir=!!n.dir;
    let btns='';if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="wk-btn docs" onclick="event.stopPropagation()">📄 Docs</a>`;if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="wk-btn drive" onclick="event.stopPropagation()">📁 Drive</a>`;if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="wk-btn nc" onclick="event.stopPropagation()">✒️ NC</a>`;if(rC)btns+=`<span class="wk-btn ref" onclick="event.stopPropagation();showDet(${n.id})">📎 ${rC}</span>`;
    const dueI=aD?`<div class="wk-gi"><span class="wk-gl">현 단계 마감</span><span class="wk-gv ${dab(TD,new Date(aD))<0?'overdue':dab(TD,new Date(aD))<=5?'warn':'ok'}">${aD}</span></div>`:'';
    w+=`<div class="wk ${tC} ${uCls}" onclick="showDet(${n.id})"><div class="wk-top"><div class="wk-t ${hasDir?'has-link':''}" onclick="handleTitle(event,${n.id})">${n.title}</div><div class="wk-bdg">${cs.i} ${cs.l}</div></div><div class="wk-tags">${n.tags.map(t=>`<span class="wk-tag">${t}</span>`).join('')}</div><div class="wk-prog"><div class="wk-prog-bar"><div class="wk-pg-d" style="width:${dW}%"></div><div class="wk-pg-a" style="width:${aW}%"></div></div><div class="wk-prog-info"><span>작업 ${prog}%</span><span>일정 ${dl.p}%</span></div></div>${note?`<div class="wk-note">${note}</div>`:''}<div class="wk-grid"><div class="wk-gi"><span class="wk-gl">분량</span><span class="wk-gv">${n.len}</span></div><div class="wk-gi"><span class="wk-gl">시작일</span><span class="wk-gv">${n.sd}</span></div><div class="wk-gi"><span class="wk-gl">목표</span><span class="wk-gv">${n.ed}</span></div><div class="wk-gi"><span class="wk-gl">남은 기간</span><span class="wk-gv ${dl.st}">${dlT}</span></div>${dueI}</div><div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--fg4);margin-bottom:3px;font-family:Outfit"><span>일정</span><span style="color:${dlC}">${dl.p}%</span></div><div class="dl-bar"><div class="dl-fill" style="width:${dl.p}%;background:${dlC}"></div></div></div><div class="wk-btns">${btns}</div></div>`;
  });
  w+='</div>';

  // Mobile Works
  let mw='<div class="mob-works">';
  ns.forEach(n=>{
    const cs=S.find(x=>x.id===n.cs);const dl=dli(n);const aD=n.st[n.cs]?.d||'';const uCls=uc(aD);const hasDir=!!n.dir;const dlT=dl.r<0?`${Math.abs(dl.r)}일 초과`:`${dl.r}일 남음`;const note=n.st[n.cs]?.n||'';
    let btns='';if(n.links.gdoc)btns+=`<a href="${n.links.gdoc}" target="_blank" class="mob-btn docs">Docs</a>`;if(n.links.gdrive)btns+=`<a href="${n.links.gdrive}" target="_blank" class="mob-btn drive">Drive</a>`;if(n.links.nc)btns+=`<a href="${n.links.nc}" target="_blank" class="mob-btn nc">NC</a>`;if(n.refs&&n.refs.length)btns+=`<span class="mob-btn ref" onclick="event.stopPropagation();showDet(${n.id})">📎${n.refs.length}</span>`;
    mw+=`<div class="mob-card ${uCls}" onclick="showDet(${n.id})"><div class="mob-top"><span class="mob-title ${hasDir?'has-link':''}" onclick="handleTitle(event,${n.id})">${n.title}</span><span class="mob-badge">${cs.i} ${cs.l}</span></div><div class="mob-tags">${n.tags.map(t=>`<span class="mob-tag">${t}</span>`).join('')}</div>${note?`<div class="wk-note" style="font-size:11px;padding:8px 10px;margin-bottom:8px">${note}</div>`:''}<div class="mob-info"><div><span class="k">진행</span><div class="v">${gp(n)}% · 일정 ${dl.p}%</div></div><div><span class="k">남은 기간</span><div class="v ${dl.st}">${dlT}</div></div><div><span class="k">분량</span><div class="v">${n.len}</div></div>${aD?`<div><span class="k">마감</span><div class="v ${dab(TD,new Date(aD))<0?'overdue':dab(TD,new Date(aD))<=5?'warn':'ok'}">${aD}</div></div>`:''}</div><div class="mob-btns" onclick="event.stopPropagation()">${btns}</div></div>`;
  });
  mw+='</div>';
  document.getElementById('wk-v').innerHTML=w+mw;
}

rp();R();
if(!dk)document.getElementById('thbtn').textContent='☀️';
</script>
