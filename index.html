<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Novel Cockpit</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#080c18;--bg1:#0c1222;--bg2:#111827;--bg3:#1a2236;--bg4:#243049;
  --fg:#e4e8f1;--fg2:#b4bdd0;--fg3:#6b7a94;--fg4:#3d4f68;
  --border:rgba(100,180,255,.06);--border2:rgba(100,180,255,.12);
  --glass:rgba(14,20,40,.65);--glass2:rgba(20,28,50,.5);
  --accent:#0ef;--accent2:#06b6d4;--accent-bg:rgba(0,238,255,.08);--accent-glow:rgba(0,238,255,.15);
  --docs:#2dd4a8;--docs-bg:rgba(45,212,168,.1);--docs-bd:rgba(45,212,168,.25);
  --nc:#7c8aff;--nc-bg:rgba(124,138,255,.1);--nc-bd:rgba(124,138,255,.25);
  --done:#10b981;--done-bg:rgba(16,185,129,.12);
  --active:#f59e0b;--active-bg:rgba(245,158,11,.1);--active-bd:rgba(245,158,11,.25);
  --warn:#fb923c;--danger:#fb7185;--danger-bg:rgba(251,113,133,.06);
  --blocked:#d946ef;--blocked-bg:rgba(217,70,239,.1);--blocked-bd:rgba(217,70,239,.25);
  --card-r:16px;
}
[data-theme="light"]{
  --bg0:#f0f2f8;--bg1:#ffffff;--bg2:#f5f7fb;--bg3:#e8ecf4;--bg4:#d0d6e2;
  --fg:#0f172a;--fg2:#334155;--fg3:#6b7280;--fg4:#9ca3af;
  --border:rgba(0,0,50,.06);--border2:rgba(0,0,50,.1);
  --glass:rgba(255,255,255,.7);--glass2:rgba(245,247,251,.6);
  --accent:#0891b2;--accent2:#0e7490;--accent-bg:rgba(8,145,178,.06);--accent-glow:rgba(8,145,178,.1);
  --docs:#059669;--docs-bg:rgba(5,150,105,.06);--docs-bd:rgba(5,150,105,.18);
  --nc:#6366f1;--nc-bg:rgba(99,102,241,.06);--nc-bd:rgba(99,102,241,.18);
  --done:#059669;--done-bg:rgba(5,150,105,.08);
  --active:#d97706;--active-bg:rgba(217,119,6,.06);--active-bd:rgba(217,119,6,.2);
}
[data-theme="light"] .ov-t thead th{color:#000;}
[data-theme="light"] .mob-label{color:#000;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Sora',sans-serif;background:var(--bg0);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(100,180,255,.07) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 5%,rgba(0,238,255,.06),transparent 50%),radial-gradient(ellipse at 85% 90%,rgba(124,138,255,.04),transparent 50%);pointer-events:none;z-index:0;}
.app{max-width:1140px;margin:0 auto;padding:24px 20px;position:relative;z-index:1;}

/* === HEADER === */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--nc));display:flex;align-items:center;justify-content:center;font-family:'Sora';font-size:20px;font-weight:800;color:#fff;box-shadow:0 0 20px var(--accent-glow);}
.brand h1{font-family:'Sora';font-size:24px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-r{display:flex;gap:8px;align-items:center;}
.add-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--accent);background:rgba(0,238,255,.08);color:var(--accent);cursor:pointer;font-size:22px;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border2);background:var(--glass2);color:var(--fg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;}

/* === NAV === */
.nav{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
.nav-tabs{display:flex;background:var(--glass);backdrop-filter:blur(16px);border-radius:12px;padding:3px;border:1px solid var(--border);}
.nav-t{padding:8px 18px;border:none;background:transparent;color:var(--fg3);cursor:pointer;border-radius:9px;font-size:13px;font-weight:600;transition:all .2s;}
.nav-t.on{background:var(--bg4);color:var(--accent);}
.pills{display:flex;gap:4px;flex-wrap:wrap;}
.pill{padding:5px 12px;border:1px solid var(--border2);background:transparent;color:var(--fg3);cursor:pointer;border-radius:100px;font-size:11px;transition:all .15s;}
.pill.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}

/* === TABLE === */
.glass-panel{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--card-r);overflow:visible;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.ov-wrap{overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 400px);}
.ov-t{width:100%;min-width:880px;border-collapse:collapse;}
.ov-t thead th{font-family:'Sora';font-size:13px;color:#fff;padding:10px 2px;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg1);z-index:10;}
.ov-t thead th:first-child{text-align:left;padding-left:22px;color:var(--fg4);}
.ov-t tbody tr{border-bottom:1px solid var(--border);transition:all .2s; cursor: grab;}
.ov-t tbody tr:hover{background:rgba(0,238,255,.03);}
.ov-t td{padding:8px 4px;text-align:center;}
.ov-t td:first-child{text-align:left;padding-left:22px;}
.ov-nm{font-size:14px;font-weight:700;color:var(--fg);cursor:pointer;text-decoration:none;}
.ov-nm.has-link{border-bottom:1px dashed var(--docs);}
.ov-sub{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.ov-tag{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--fg3);}

/* === CELLS === */
.c{display:inline-flex;align-items:center;justify-content:center;width:84%;height:30px;border-radius:7px;cursor:pointer;position:relative;transition:all .2s;}
.c:hover{transform:scale(1.1);}
.c.d.docs{background:var(--docs-bg);border:1px solid var(--docs-bd);}
.c.d.nc{background:var(--nc-bg);border:1px solid var(--nc-bd);}
.c.d.none{background:var(--done-bg);border:1px solid rgba(16,185,129,.18);}
.c.d.complete-done{background:rgba(34,211,238,.15);border:2px solid rgba(34,211,238,.4);}
.c.a{background:var(--active-bg);border:1px solid var(--active-bd);box-shadow:0 0 14px rgba(245,158,11,.12);}
.c.p{background:var(--bg3);opacity:.3;}
.c.b{background:var(--blocked-bg);border:1px solid var(--blocked-bd);}
.cl{font-size:9px;font-weight:800;color:#fff;text-transform:uppercase;}
.c-due{position:absolute;top:-7px;right:-8px;font-size:7px;background:var(--bg4);color:var(--fg3);padding:1px 5px;border-radius:4px;}

/* === MODAL & UI === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:201;width:90%;max-width:420px;background:var(--bg1);border-radius:20px;padding:30px;box-shadow:0 28px 72px rgba(0,0,0,.5);border:1px solid var(--border2);}
.modal h3{font-family:'Sora';font-size:18px;margin-bottom:15px;}
.modal label{display:block;font-size:11px;color:var(--fg4);text-transform:uppercase;margin-top:15px;margin-bottom:5px;}
.modal input, .modal select, .modal textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:#fff;font-family:inherit;}
.m-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.m-btn{padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600;border:none;transition:0.2s;}
.m-ok{background:var(--accent);color:#000;}
.m-danger{background:var(--danger);color:#fff;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg2);color:#fff;padding:12px 24px;border-radius:12px;z-index:999;box-shadow:0 12px 40px rgba(0,0,0,.4);font-size:12px;}

.hidden{display:none!important;}
@keyframes blink { 50% { opacity: 0.4; } }
.u3 { animation: blink 0.8s infinite; }

/* Context Menu */
.ctx{position:fixed;z-index:300;background:var(--bg1);border:1px solid var(--border2);border-radius:14px;padding:6px;min-width:180px;box-shadow:0 20px 56px rgba(0,0,0,.5);}
.ctx-item{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--fg2);display:flex;align-items:center;gap:8px;}
.ctx-item:hover{background:var(--bg3);color:var(--fg);}

.m-tags-grid{display:flex;flex-wrap:wrap;gap:6px;}
.m-tag-cb{display:none;}
.m-tag-label{padding:5px 12px;border-radius:100px;border:1px solid var(--border2);color:var(--fg3);font-size:12px;cursor:pointer;}
.m-tag-cb:checked+.m-tag-label{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
</style>
</head>
<body>
<div class="app">
  <div id="main-view">
    <div class="hdr">
      <div class="brand"><div class="brand-mark">N</div><div><h1>Novel Cockpit</h1><div id="stats" style="font-size:10px; color:var(--fg3)"></div></div></div>
      <div class="hdr-r">
        <span id="sync-badge" style="font-family:Sora;font-size:10px;color:var(--fg4);margin-right:8px"></span>
        <button class="add-btn" onclick="addNovel()">+</button>
        <button class="icon-btn" id="thbtn" onclick="togTheme()">🌙</button>
        <button class="icon-btn" onclick="openSet()">⚙️</button>
      </div>
    </div>
    <div class="nav">
      <div class="nav-tabs"><button class="nav-t on" data-v="overview" onclick="sv('overview')">전체보기</button></div>
      <div id="pills" class="pills"></div>
    </div>
    <div id="ov-v"></div>
  </div>
</div>

<div id="ctx-menu" class="ctx hidden"></div>
<div id="modal-bg" class="modal-bg hidden" onclick="closeModal()"></div>
<div id="modal" class="modal hidden"></div>

<script>
const S=[{id:"ideation",l:"착상",i:"💡"},{id:"structure",l:"구조설계",i:"🏗"},{id:"story",l:"BG",i:"🧬"},{id:"scene_structure",l:"씬구조",i:"🎬"},{id:"scene_beat",l:"씬비트",i:"🥁"},{id:"draft",l:"초고",i:"✍️"},{id:"revision",l:"퇴고",i:"🔄"},{id:"complete",l:"교정교열",i:"✅"},{id:"publishing",l:"발행",i:"📡"}];
const TAGS=["SF","문학","엽편","단편","중편","장편","야설","에로","판타지"];
const TL={gdoc:'Docs',nc:'NC',gdrive:'Drive'};
let N=[];
const API_URL = 'https://script.google.com/macros/s/AKfycbxQ4CNeYPz6Mf4iFOaiopQcXy1kfWpImBPSDqjztTD3XdAJFWWWSpXKmev9Th1Zmf53/exec';
const SHEETS_ENABLED = API_URL !== 'YOUR_APPS_SCRIPT_URL';

function fmtD(v) {
  if (!v || v === 'NaN') return '';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '';
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function sheetsToN(data){
  return data.novels.map(row=>({
    id:row.id, title:row.title, tags: row.tags ? String(row.tags).split(',') : [],
    cs:row.cs||'ideation', sd:fmtD(row.sd), ed:fmtD(row.ed), len:row.len||'', dir:row.dir||'',
    links:{gdoc:row.gdoc||'',gdrive:row.gdrive||'',nc:row.nc||''},
    sl:{}, st:{}
  })).map(n => {
    S.forEach(s => { n.sl[s.id]={u:'',t:''}; n.st[s.id]={s:'pending',n:'',d:''}; });
    data.stages.filter(s=>s.novelId==n.id).forEach(s => {
      n.st[s.stageId]={s:s.status||'pending',n:s.note||'',d:fmtD(s.due)};
      n.sl[s.stageId]={u:s.url||'',t:s.tool||''};
    });
    return n;
  });
}

function nToSheets(novels){
  return {
    novels: novels.map(n=>({ id:n.id, title:n.title, tags:n.tags.join(','), cs:n.cs, sd:n.sd, ed:n.ed, len:n.len, dir:n.dir })),
    stages: novels.flatMap(n=> S.map(s=> ({ novelId:n.id, stageId:s.id, status:n.st[s.id].s, due:n.st[s.id].d, note:n.st[s.id].n, url:n.sl[s.id].u, tool:n.sl[s.id].t })))
  };
}

let isSaving=false, saveTimer=null, at=new Set();

async function loadFromSheets(force){
  if(!SHEETS_ENABLED || isSaving) return;
  document.getElementById('sync-badge').textContent = "싱크중...";
  try{
    const res = await fetch(API_URL);
    const data = await res.json();
    if(data.novels) { N = sheetsToN(data); R(); document.getElementById('sync-badge').textContent = "✓ 동기화됨"; }
  }catch(e){ document.getElementById('sync-badge').textContent = "⚠ 연결오류"; }
}

async function saveToSheets(){
  if(!SHEETS_ENABLED) return;
  isSaving=true; document.getElementById('sync-badge').textContent = "저장중...";
  try{
    const payload = { action:'save_all', ...nToSheets(N) };
    await fetch(API_URL,{method:'POST', body:JSON.stringify(payload)});
    document.getElementById('sync-badge').textContent = "✓ 저장완료";
  } catch(e) { document.getElementById('sync-badge').textContent = "⚠ 저장오류"; }
  isSaving=false;
}

function persist(){ R(); clearTimeout(saveTimer); saveTimer=setTimeout(saveToSheets, 1500); }

function R(){
  const ns = at.size === 0 ? N : N.filter(n => [...at].some(t => n.tags.includes(t)));
  document.getElementById('stats').textContent = `${N.length} Projects Active`;
  let o = `<div class="glass-panel ov-wrap"><table class="ov-t"><thead><tr><th>작품명</th>${S.map(s=>`<th>${s.l}</th>`).join('')}</tr></thead><tbody>`;
  ns.forEach((n,idx)=>{
    o += `<tr draggable="true" ondragstart="drag(event,${n.id})" ondragover="allowDrop(event)" ondrop="drop(event,${n.id})">
    <td><span class="ov-nm ${n.dir?'has-link':''}" onclick="handleTitle(event,${n.id})">${idx+1}. ${n.title}</span>
    <div class="ov-sub">${n.tags.map(t=>`<span class="ov-tag">${t}</span>`).join('')}</div></td>`;
    S.forEach(st=>{
      const info=n.st[st.id]; const sl=n.sl[st.id]; let cc='c ';
      const tc = sl.t==='nc'?'nc':(sl.t==='gdoc'?'docs':'none');
      if(info.s==='done') cc+='d ' + (st.id==='complete'?'complete-done':tc);
      else if(info.s==='active') cc+='a '+(info.d?uc(info.d):'');
      else if(info.s==='blocked') cc+='b'; else cc+='p';
      o += `<td><div class="${cc}" onclick="handleCell(event,${n.id},'${st.id}')" oncontextmenu="showCtx(event,${n.id},'${st.id}')">
      <span class="cl">${info.s==='active'?'NOW':(info.s==='done'?(TL[sl.t]||'✓'):'')}</span>
      ${info.d?`<span class="c-due">📅${info.d.slice(5)}</span>`:''}</div></td>`;
    });
    o += `</tr>`;
  });
  document.getElementById('ov-v').innerHTML = o + `</tbody></table></div>`;
  rp();
}

function uc(d){
  const days = Math.round((new Date(d) - new Date()) / 864e5);
  return days < 0 ? 'uc' : (days <= 2 ? 'u3' : (days <= 5 ? 'u2' : ''));
}

function handleTitle(e, nid){ e.stopPropagation(); const n=N.find(x=>x.id===nid); if(n.dir) window.open(n.dir,'_blank'); else titleDbl(nid); }

function addNovel(){
  const today=new Date().toISOString().slice(0,10);
  showModal(`<h3>➕ 새 작품 추가</h3>
    <label>제목</label><input type="text" id="m-title"/>
    <label>태그</label><div class="m-tags-grid">${TAGS.map(t=>`<input type="checkbox" class="m-tag-cb" id="mt-${t}" value="${t}"><label class="m-tag-label" for="mt-${t}">${t}</label>`).join('')}</div>
    <label>시작일</label><input type="date" id="m-sd" value="${today}"/>
    <div class="m-btns"><button class="m-btn m-ok" onclick="saveNewNovel()">추가</button></div>`);
}

function saveNewNovel(){
  const title=document.getElementById('m-title').value; if(!title) return;
  const tags=TAGS.filter(t=>document.getElementById('mt-'+t).checked);
  const newId=Date.now();
  const st={}; S.forEach(s=>st[s.id]={s:'pending',d:'',n:''}); st.ideation.s='active';
  const sl={}; S.forEach(s=>sl[s.id]={u:'',t:''});
  N.push({id:newId, title, tags, cs:'ideation', sd:document.getElementById('m-sd').value, ed:'', len:'', dir:'', st, sl});
  closeModal(); persist();
}

function titleDbl(nid){
  const n=N.find(x=>x.id===nid);
  showModal(`<h3>✏️ 작품 수정</h3>
    <label>제목</label><input type="text" id="m-title" value="${n.title}"/>
    <label>태그</label><div class="m-tags-grid">${TAGS.map(t=>`<input type="checkbox" class="m-tag-cb" id="mt-${t}" value="${t}" ${n.tags.includes(t)?'checked':''}><label class="m-tag-label" for="mt-${t}">${t}</label>`).join('')}</div>
    <label>Drive 폴더</label><input type="url" id="m-dir" value="${n.dir||''}"/>
    <label>분량</label><input type="text" id="m-len" value="${n.len}"/>
    <div class="m-btns"><button class="m-btn m-danger" onclick="deleteNovel(${nid})">삭제</button><button class="m-btn m-ok" onclick="saveTitle(${nid})">저장</button></div>`);
}

function saveTitle(nid){
  const n=N.find(x=>x.id===nid);
  n.title=document.getElementById('m-title').value;
  n.tags=TAGS.filter(t=>document.getElementById('mt-'+t).checked);
  n.dir=document.getElementById('m-dir').value;
  n.len=document.getElementById('m-len').value;
  closeModal(); persist();
}

function cellDbl(nid,sid){
  const n=N.find(x=>x.id===nid); const info=n.st[sid]; const sl=n.sl[sid];
  showModal(`<h3>${S.find(s=>s.id===sid).l} 설정</h3>
    <label>문서 URL</label><input type="url" id="m-url" value="${sl.u||''}"/>
    <label>도구</label><select id="m-tool"><option value="gdoc" ${sl.t==='gdoc'?'selected':''}>Docs</option><option value="nc" ${sl.t==='nc'?'selected':''}>NC</option></select>
    <label>상태</label><select id="m-status"><option value="pending" ${info.s==='pending'?'selected':''}>대기</option><option value="active" ${info.s==='active'?'selected':''}>진행</option><option value="done" ${info.s==='done'?'selected':''}>완료</option></select>
    <label>마감일</label><input type="date" id="m-due" value="${info.d||''}"/>
    <div class="m-btns"><button class="m-btn m-ok" onclick="saveCell(${nid},'${sid}')">확인</button></div>`);
}

function saveCell(nid,sid){
  const n=N.find(x=>x.id===nid);
  n.sl[sid].u=document.getElementById('m-url').value;
  n.sl[sid].t=document.getElementById('m-tool').value;
  n.st[sid].s=document.getElementById('m-status').value;
  n.st[sid].d=document.getElementById('m-due').value;
  closeModal(); persist();
}

function handleCell(e,nid,sid){ e.stopPropagation(); const n=N.find(x=>x.id===nid); const sl=n.sl[sid]; if(sl.u) window.open(sl.u,'_blank'); else cellDbl(nid,sid); }
function showCtx(e,nid,sid){ e.preventDefault(); e.stopPropagation(); const ctx=document.getElementById('ctx-menu'); ctx.innerHTML=`<div class="ctx-item" onclick="cellDbl(${nid},'${sid}')">⚙️ 상세 설정</div>`; ctx.classList.remove('hidden'); ctx.style.left=e.clientX+'px'; ctx.style.top=e.clientY+'px'; }
document.addEventListener('click', ()=>document.getElementById('ctx-menu').classList.add('hidden'));

function rp(){ document.getElementById('pills').innerHTML=TAGS.map(t=>`<button class="pill ${at.has(t)?'on':''}" onclick="tt('${t}')">${t}</button>`).join(''); }
function tt(t){ if(at.has(t)) at.delete(t); else at.add(t); R(); }
function sv(v){ R(); }
function togTheme(){ document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='light'?'dark':'light'); }
function showModal(h){ document.getElementById('modal-bg').classList.remove('hidden'); const m=document.getElementById('modal'); m.classList.remove('hidden'); m.innerHTML=h; }
function closeModal(){ document.getElementById('modal').classList.add('hidden'); document.getElementById('modal-bg').classList.add('hidden'); }
function openSet(){ alert("수동 동기화는 상단 버튼을 이용해주세요."); }
function deleteNovel(nid){ if(confirm('정말 삭제할까요?')){ N=N.filter(x=>x.id!==nid); closeModal(); persist(); } }

let draggedId=null;
function drag(e,id){draggedId=id; e.target.style.opacity=0.5;}
function allowDrop(e){e.preventDefault();}
function drop(e,tid){
  e.preventDefault(); if(draggedId===tid) return;
  const idx1=N.findIndex(x=>x.id===draggedId), idx2=N.findIndex(x=>x.id===tid);
  const [removed]=N.splice(idx1,1); N.splice(idx2,0,removed);
  persist();
}

setInterval(()=> { if(!isSaving && !document.hidden) loadFromSheets(); }, 60000);
